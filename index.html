<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>240×240 空调与智能控制八模式整圆滑动</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(circle at 50% 42%, rgba(42, 96, 135, .22), transparent 32%),
      radial-gradient(circle at 50% 50%, #101821 0%, #070b10 55%, #020304 100%);
    display: grid;
    place-items: center;
    overflow: hidden;
    font-family: Arial, "Microsoft YaHei", sans-serif;
  }

  .viewport {
    width: 240px;
    height: 240px;
    position: relative;
    overflow: visible;
    touch-action: none;
    filter:
      drop-shadow(0 20px 34px rgba(0, 0, 0, .70))
      drop-shadow(0 0 18px rgba(80, 190, 255, .10));
  }

  .viewport::before {
    content: "";
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background:
      radial-gradient(circle, rgba(100, 220, 255, .12), transparent 62%);
    pointer-events: none;
    opacity: .75;
  }

  .slider {
    position: absolute;
    left: 0;
    top: 0;
    height: 240px;
    display: flex;
    gap: 26px;
    will-change: transform;
    transition: transform .34s cubic-bezier(.22,.78,.22,1);
  }

  .screen {
    --accent: #48d8ff;
    --accent-soft: rgba(72, 216, 255, .22);
    --accent-ring: rgba(72, 216, 255, .72);
    --dynamic-surface-1: rgba(255,255,255,0);
    --dynamic-surface-2: rgba(255,255,255,0);
    --dynamic-glow-inner: rgba(255,255,255,0);
    --dynamic-glow-outer: rgba(255,255,255,0);
    position: relative;
    width: 240px;
    height: 240px;
    flex: 0 0 240px;
    border-radius: 50%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 33%, rgba(255,255,255,.075), transparent 20%),
      radial-gradient(circle at 50% 52%, var(--dynamic-surface-1) 0%, var(--dynamic-surface-2) 34%, rgba(10, 22, 32, .98) 64%, #050a10 82%, #000 100%);
    border: 2px solid rgba(210, 225, 238, .38);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.08),
      inset 0 0 18px rgba(255,255,255,.035),
      inset 0 0 34px var(--accent-soft),
      inset 0 0 58px var(--dynamic-glow-inner),
      0 0 0 1px rgba(255,255,255,.05),
      0 0 26px rgba(0,0,0,.80),
      0 0 28px var(--accent-soft),
      0 0 36px var(--dynamic-glow-outer);
    user-select: none;
    touch-action: none;
    transition:
      transform .34s cubic-bezier(.22,.78,.22,1),
      opacity .34s cubic-bezier(.22,.78,.22,1),
      filter .34s cubic-bezier(.22,.78,.22,1),
      background .24s ease,
      box-shadow .24s ease;
  }

  .screen::before {
    content: "";
    position: absolute;
    inset: 9px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow:
      inset 0 0 18px rgba(255,255,255,.035),
      0 0 18px var(--accent-soft);
    pointer-events: none;
    z-index: 1;
  }

  .screen::after {
    content: "";
    position: absolute;
    inset: 21px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 42%, var(--accent-soft), transparent 42%),
      radial-gradient(circle at 50% 56%, var(--dynamic-glow-inner), transparent 62%);
    opacity: .60;
    pointer-events: none;
    z-index: 1;
    transition: background .24s ease, opacity .24s ease;
  }


  .ac-cool-screen {
    --accent: #22d8ff;
    --accent-soft: rgba(34, 216, 255, .22);
    --accent-ring: rgba(34, 216, 255, .76);
  }

  .ac-heat-screen {
    --accent: #ff8c1f;
    --accent-soft: rgba(255, 118, 24, .22);
    --accent-ring: rgba(255, 145, 28, .80);
  }

  .ac-fresh-screen {
    --accent: #20e5ff;
    --accent-soft: rgba(32, 229, 255, .20);
    --accent-ring: rgba(32, 229, 255, .74);
  }

  .ac-dry-screen {
    --accent: #28efaa;
    --accent-soft: rgba(40, 239, 170, .20);
    --accent-ring: rgba(40, 239, 170, .74);
  }


  .ac-cool-icon {
    filter:
      drop-shadow(0 0 6px rgba(34, 216, 255, .96))
      drop-shadow(0 0 16px rgba(0, 170, 255, .42));
  }

  .ac-snow-line {
    fill: none;
    stroke: #22d8ff;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .ac-heat-icon {
    filter:
      drop-shadow(0 0 6px rgba(255, 150, 38, .96))
      drop-shadow(0 0 16px rgba(255, 90, 20, .45));
  }

  .ac-sun-core {
    fill: #ff9a1f;
  }

  .ac-sun-ray {
    fill: none;
    stroke: #ffb84a;
    stroke-width: 3;
    stroke-linecap: round;
  }

  .ac-dry-icon {
    filter:
      drop-shadow(0 0 6px rgba(40, 239, 170, .94))
      drop-shadow(0 0 15px rgba(0, 220, 150, .42));
  }

  .ac-drop {
    fill: #28efaa;
  }

  .ac-drop-small {
    fill: #83ffcf;
    opacity: .92;
  }


  .fresh-screen {
    --accent: #1edcff;
    --accent-soft: rgba(30, 220, 255, .22);
    --accent-ring: rgba(30, 220, 255, .75);
  }

  .floor-screen {
    --accent: #ff9a1f;
    --accent-soft: rgba(255, 138, 28, .22);
    --accent-ring: rgba(255, 160, 36, .78);
  }

  .light-screen {
    --accent: #ffe76a;
    --accent-soft: rgba(255, 220, 70, .22);
    --accent-ring: rgba(255, 225, 95, .82);
  }

  .color-temp-screen {
    --accent: #ffcf58;
    --accent-soft: rgba(255, 205, 88, .17);
    --accent-ring: rgba(128, 220, 255, .72);
  }




  .screen.is-current {
    transform: scale(1);
    opacity: 1;
    filter: none;
  }

  .screen.is-away {
    transform: scale(.965);
    opacity: .72;
    filter: saturate(.86) brightness(.86);
  }

  .ticks {
    position: absolute;
    inset: 0;
    z-index: 7;
  }

  .tick {
    position: absolute;
    left: 117px;
    top: 18px;
    width: 6px;
    height: 15px;
    border-radius: 7px;
    transform-origin: 3px 102px;
    cursor: pointer;
    transition: top .12s, height .12s, opacity .12s, filter .12s, background .12s, box-shadow .12s;
    background: rgba(255,255,255,.10);
    opacity: .34;
    box-shadow: none;
  }

  .tick.selected {
    top: 17px;
    height: 18px;
    opacity: 1 !important;
    filter: brightness(1.38);
    outline: 1px solid rgba(255,255,255,.92);
    outline-offset: 1px;
  }

  .mode-icon {
    position: absolute;
    top: 45px;
    left: 50%;
    transform: translateX(-50%);
    width: 47px;
    height: 47px;
    display: grid;
    place-items: center;
    z-index: 4;
    pointer-events: none;
  }

  .mode-icon-svg {
    width: 42px;
    height: 42px;
    overflow: visible;
    display: block;
  }

  .fresh-icon {
    filter:
      drop-shadow(0 0 6px rgba(30, 220, 255, 0.92))
      drop-shadow(0 0 14px rgba(0, 190, 255, 0.40));
  }

  .fresh-blade { fill: #1edcff; }

  .floor-icon {
    filter:
      drop-shadow(0 0 6px rgba(255, 150, 40, 0.95))
      drop-shadow(0 0 15px rgba(255, 95, 0, 0.48));
  }

  .floor-line {
    fill: none;
    stroke: #ff9a1f;
    stroke-width: 3.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .floor-base {
    fill: none;
    stroke: rgba(255, 210, 118, 0.92);
    stroke-width: 3;
    stroke-linecap: round;
  }

  .light-icon {
    filter:
      drop-shadow(0 0 6px rgba(255, 230, 92, 0.95))
      drop-shadow(0 0 15px rgba(255, 190, 30, 0.45));
  }

  .light-ray {
    stroke: #ffe76a;
    stroke-width: 3;
    stroke-linecap: round;
    fill: none;
  }

  .light-bulb { fill: #ffd84a; }
  .light-core { fill: rgba(255, 255, 218, 0.95); }


  .light-screen .unit {
    margin-left: 3px;
    margin-top: 0;
    font-size: 58px;
    line-height: 1;
  }

  .brightness-icon {
    filter:
      drop-shadow(0 0 6px rgba(255, 232, 90, 0.96))
      drop-shadow(0 0 18px rgba(255, 190, 40, 0.46));
  }

  .brightness-circle {
    fill: #ffd84a;
  }

  .brightness-ring {
    fill: none;
    stroke: #ffe76a;
    stroke-width: 3;
  }

  .brightness-ray {
    stroke: #ffe76a;
    stroke-width: 3;
    stroke-linecap: round;
  }

  .fresh-wind-icon {
    filter:
      drop-shadow(0 0 6px rgba(32, 225, 255, 0.92))
      drop-shadow(0 0 14px rgba(0, 190, 255, 0.42));
  }

  .fresh-wind-line {
    fill: none;
    stroke: #1edcff;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .fresh-wind-dot {
    fill: #1edcff;
  }



  .brightness-premium-bulb-icon {
    filter:
      drop-shadow(0 0 5px rgba(255, 220, 82, .86))
      drop-shadow(0 0 13px rgba(255, 168, 42, .30));
  }

  .premium-rays path {
    fill: none;
    stroke: url(#premiumBulbStroke);
    stroke-width: 2.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: .82;
  }

  .premium-bulb-outline {
    fill: none;
    stroke: url(#premiumBulbStroke);
    stroke-width: 3.1;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .premium-inner-glow {
    fill: none;
    stroke: rgba(255, 242, 166, .72);
    stroke-width: 2.0;
    stroke-linecap: round;
  }

  .premium-base path {
    fill: none;
    stroke: #ffd84a;
    stroke-width: 2.4;
    stroke-linecap: round;
    opacity: .9;
  }



  .ac-original-snow-main {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: grid;
    place-items: center;
    z-index: 4;
    pointer-events: none;
  }

  .ac-original-snowflake {
    top: 52px;
    color: #33dfff;
    font-size: 37px;
    line-height: 1;
    text-shadow: 0 0 11px #00bfff;
  }

  .ac-original-ventilation {
    top: 50px;
    width: 38px;
    height: 38px;
    filter:
      drop-shadow(0 0 6px rgba(30, 220, 255, 0.92))
      drop-shadow(0 0 14px rgba(0, 190, 255, 0.40));
  }

  .ac-original-icon-svg {
    width: 40px;
    height: 40px;
    overflow: visible;
  }

  .ac-original-mode-icon-blade {
    fill: #1edcff;
  }

  .ac-original-dry {
    top: 48px;
    width: 42px;
    height: 42px;
    filter:
      drop-shadow(0 0 6px rgba(35, 255, 185, 0.95))
      drop-shadow(0 0 14px rgba(0, 230, 155, 0.50));
  }

  .ac-original-dry-svg {
    width: 38px;
    height: 38px;
    overflow: visible;
  }

  .ac-original-mode-icon-drop {
    fill: #22f0a8;
  }



  .refbulb-icon {
    top: 45px;
    width: 36px;
    height: 36px;
    display: grid;
    place-items: center;
    opacity: .82;
  }

  .refbulb-svg {
    width: 36px;
    height: 36px;
    overflow: visible;
  }

  .refbulb-light {
    filter: drop-shadow(0 0 8px rgba(255, 255, 255, .26));
  }

  .refbulb-colortemp {
    filter: drop-shadow(0 0 6px rgba(255, 227, 154, .24));
  }

  .refbulb-light .refbulb-rays,
  .refbulb-light .refbulb-body,
  .refbulb-light .refbulb-base {
    fill: #f7fbff;
  }

  .refbulb-colortemp .refbulb-rays,
  .refbulb-colortemp .refbulb-body,
  .refbulb-colortemp .refbulb-base {
    fill: #fff0b6;
  }


  .temp-group {
    position: absolute;
    top: 92px;
    left: 50%;
    transform: translateX(-50%);
    width: 166px;
    height: 72px;
    z-index: 4;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .temp-value {
    display: inline-flex;
    align-items: flex-start;
    justify-content: center;
    white-space: nowrap;
  }

  .temp {
    position: static;
    color: #ffffff;
    font-size: 58px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -2px;
    text-shadow:
      0 0 9px currentColor,
      0 0 18px rgba(255,255,255,.10);
    white-space: nowrap;
    transition: color .18s ease, text-shadow .18s ease;
  }

  .unit {
    position: static;
    margin-left: 3px;
    margin-top: 6px;
    font-size: 29px;
    font-weight: 300;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 10px rgba(95,195,255,.78);
    white-space: nowrap;
  }

  .light-screen .temp,
  .light-screen .unit {
    text-shadow: 0 0 10px rgba(255, 220, 80, .78);
  }


  .light-screen .temp.off-text {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: 0;
  }

  .color-temp-screen .temp-group {
    top: 94px;
  }

  .color-temp-screen .temp {
    font-size: 58px;
  }

  .color-temp-screen .temp-side {
    margin-left: 3px;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
  }

  .color-temp-screen .unit {
    margin: 0;
    font-size: 29px;
    line-height: .9;
  }

  .color-temp-screen .temp-tail {
    margin-top: 2px;
    font-size: 23px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -1px;
    color: #fff;
    text-shadow: 0 0 9px rgba(255, 220, 80, .78);
    white-space: nowrap;
    transition: color .18s ease, text-shadow .18s ease;
  }

  .fan-area {
    position: absolute;
    top: 132px;
    left: 126px;
    width: 98px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 5px;
    z-index: 12;
    cursor: ew-resize;
    padding: 10px 8px;
    border-radius: 18px;
    overflow: visible;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .fan-area:active {
    background: rgba(70,190,255,.10);
  }

  .fan {
    width: 18px;
    height: 18px;
    display: grid;
    place-items: center;
    animation: spin 1.25s linear infinite;
    filter: drop-shadow(0 0 5px rgba(120,210,255,.78));
    flex: 0 0 auto;
    margin-left: 3px;
  }

  .fan-svg {
    width: 18px;
    height: 18px;
    overflow: visible;
  }

  .fan-blade {
    fill: rgba(255,255,255,.96);
    transition: fill .18s ease;
  }

  .fan-core {
    fill: rgba(255,255,255,1);
    transition: fill .18s ease;
  }

  .fan-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 22px;
    width: 38px;
    overflow: visible;
    flex: 0 0 auto;
  }

  .fan-bars b {
    display: block;
    width: 2px;
    border-radius: 2px;
    background: rgba(170, 210, 235, .46);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    transition: background .15s, box-shadow .15s, opacity .15s;
    opacity: .98;
    flex: 0 0 auto;
  }

  .fan-bars b:nth-child(1) { height: 8px; }
  .fan-bars b:nth-child(2) { height: 10px; }
  .fan-bars b:nth-child(3) { height: 12px; }
  .fan-bars b:nth-child(4) { height: 14px; }
  .fan-bars b:nth-child(5) { height: 16px; }
  .fan-bars b:nth-child(6) { height: 18px; }
  .fan-bars b:nth-child(7) { height: 20px; }
  .fan-bars b.on { opacity: 1; }

  .room {
    position: absolute;
    left: 50%;
    bottom: 31px;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #fff;
    font-size: 20px;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(95,195,255,.75);
    z-index: 5;
  }

  .home-icon {
    width: 26px;
    height: 26px;
    flex: 0 0 auto;
    filter: drop-shadow(0 0 5px rgba(120,210,255,.75));
  }

  .bottom-label {
    position: relative;
    font-size: 21px;
    letter-spacing: .14em;
    color: #fff7bd;
    text-shadow:
      0 0 8px rgba(255, 220, 80, .88),
      0 0 14px rgba(255, 190, 30, .42);
    white-space: nowrap;
  }

  .bottom-label::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -8px;
    width: 24px;
    height: 2px;
    border-radius: 4px;
    transform: translateX(-50%);
    background: currentColor;
    box-shadow: 0 0 8px currentColor;
    opacity: .72;
  }

  .toast {
    position: absolute;
    left: 50%;
    bottom: 61px;
    transform: translateX(-50%);
    min-width: 68px;
    padding: 4px 9px;
    border-radius: 12px;
    background: rgba(0,20,35,.64);
    color: #e8f8ff;
    font-size: 11px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease;
    z-index: 12;
  }

  .toast.show { opacity: 1; }


  .light-screen .bottom-label::after,
  .color-temp-screen .bottom-label::after {
    display: none;
  }

  .glass {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background:
      linear-gradient(145deg, rgba(255,255,255,.12), transparent 25%),
      radial-gradient(circle at 63% 13%, rgba(255,255,255,.07), transparent 18%),
      linear-gradient(215deg, transparent 0%, rgba(255,255,255,.035) 52%, transparent 72%);
    pointer-events: none;
    z-index: 20;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 亮度模式：去掉刻度，放入客厅灯图 */
  .light-screen .ticks {
    display: none !important;
  }

  .light-screen .brightness-photo {
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 2;
    pointer-events: none;
    opacity: .92;
    box-shadow:
      inset 0 0 28px rgba(0,0,0,.58),
      inset 0 0 0 1px rgba(255,255,255,.10);
  }

  .light-screen .brightness-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 32%;
    filter: brightness(.78) contrast(1.05) saturate(.95);
    display: block;
  }

  .light-screen .brightness-photo::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 24%, rgba(255,240,190,.32), transparent 32%),
      radial-gradient(circle at 50% 55%, rgba(0,0,0,.18), rgba(0,0,0,.54) 72%, rgba(0,0,0,.76) 100%);
    pointer-events: none;
  }

  .light-screen .refbulb-icon,
  .light-screen .temp-group {
    z-index: 6;
  }

  .light-screen .temp,
  .light-screen .unit {
    color: #ffffff !important;
    text-shadow:
      0 0 9px rgba(255,255,255,.94),
      0 0 20px rgba(255,228,150,.72) !important;
  }


  /* 亮度模式背景图可见性修正版 */
  .light-screen .ticks {
    display: none !important;
  }

  .light-screen .brightness-photo {
    position: absolute !important;
    inset: 7px !important;
    border-radius: 50% !important;
    overflow: hidden !important;
    z-index: 2 !important;
    pointer-events: none !important;
    opacity: 1 !important;
    background: #000 !important;
    box-shadow:
      inset 0 0 18px rgba(0,0,0,.28),
      inset 0 0 0 1px rgba(255,255,255,.20) !important;
  }

  .light-screen .brightness-photo img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    object-position: center bottom !important;
    filter: brightness(1.06) contrast(1.02) saturate(1.02) !important;
    display: block !important;
  }

  .light-screen .brightness-photo::after {
    content: "" !important;
    position: absolute !important;
    inset: 0 !important;
    border-radius: 50% !important;
    background:
      radial-gradient(circle at 50% 18%, rgba(255, 244, 205, .06), transparent 28%),
      radial-gradient(circle at 50% 58%, rgba(0,0,0,.00), rgba(0,0,0,.18) 76%, rgba(0,0,0,.38) 100%) !important;
    pointer-events: none !important;
  }

  .light-screen::after {
    opacity: .18 !important;
  }

  .light-screen .glass {
    opacity: .45 !important;
  }

  .light-screen .refbulb-icon,
  .light-screen .temp-group {
    z-index: 6 !important;
  }

  .light-screen .temp,
  .light-screen .unit {
    color: #ffffff !important;
    text-shadow:
      0 0 10px rgba(0,0,0,.75),
      0 0 16px rgba(255,236,180,.85) !important;
  }


  /* 亮度、色温页面去掉图标 */
  .light-screen .refbulb-icon,
  .color-temp-screen .refbulb-icon {
    display: none !important;
  }

  .light-screen .temp-group,
  .color-temp-screen .temp-group {
    z-index: 8 !important;
  }


  /* 亮度页：顶部灯具 + 向下打光 */
  .light-screen .brightness-photo {

          <path class="light-bulb" d="M24 12 C16.5 12 12 17.3 12 24.1 C12 28.8 14.4 32.0 18.0 34.4 C19.5 35.4 20.0 36.7 20.0 38.5 H28.0 C28.0 36.7 28.5 35.4 30.0 34.4 C33.6 32.0 36 28.8 36 24.1 C36 17.3 31.5 12 24 12 Z"/>
          <path class="light-core" d="M21 18.5 C18.6 20.2 17.5 22.3 17.7 25.1 C17.9 27.5 19.2 29.5 21.1 30.8 C20.2 27.1 20.8 23.1 23.4 19.3 C24.0 18.4 22.0 17.8 21 18.5 Z"/>
          <path class="light-ray" d="M20 41 H28"/>
          <path class="light-ray" d="M21 45 H27"/>
        </svg>
      </div>
    `;
  }

  function fanIconHTML() {
    return `
      <div class="fan" aria-hidden="true">
        <svg class="fan-svg" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="1.9" class="fan-core"/>
          <path d="M12 3.1c2.7 0 4.3 1.2 4.3 2.8 0 1.9-1.8 3.6-4.9 4.4-.6.2-1-.1-1.1-.7-.4-2.5-.2-4.5.6-5.6.3-.5.7-.9 1.1-.9z" class="fan-blade"/>
          <path d="M20.9 12c0 2.7-1.2 4.3-2.8 4.3-1.9 0-3.6-1.8-4.4-4.9-.2-.6.1-1 .7-1.1 2.5-.4 4.5-.2 5.6.6.5.3.9.7.9 1.1z" class="fan-blade"/>
          <path d="M12 20.9c-2.7 0-4.3-1.2-4.3-2.8 0-1.9 1.8-3.6 4.9-4.4.6-.2 1 .1 1.1.7.4 2.5.2 4.5-.6 5.6-.3.5-.7.9-1.1.9z" class="fan-blade"/>
          <path d="M3.1 12c0-2.7 1.2-4.3 2.8-4.3 1.9 0 3.6 1.8 4.4 4.9.2.6-.1 1-.7 1.1-2.5.4-4.5.2-5.6-.6-.5-.3-.9-.7-.9-1.1z" class="fan-blade"/>
        </svg>
      </div>
    `;
  }

  function fanAreaHTML() {
    return `
      <div class="fan-area" title="点击或拖动切换风量">
        ${fanIconHTML()}
        <div class="fan-bars"><b></b><b></b><b></b><b></b><b></b><b></b><b></b></div>
      </div>
    `;
  }

  function valueDisplayHTML(mode, state) {
    if (mode.key === "color-temp") {
      const text = String(state.value);
      return `
        <div class="temp-group">
          <div class="temp-value">
            <span class="temp">${text.slice(0, 2)}</span>
            <span class="temp-side">
              <span class="unit">K</span>
              <span class="temp-tail">${text.slice(2)}</span>
            </span>
          </div>
        </div>
      `;
    }

    return `
      <div class="temp-group">
        <div class="temp-value">
          <span class="temp">${state.value}</span><span class="unit">${mode.unit}</span>
        </div>
      </div>
    `;
  }

  function createScreen(mode, index) {
    const state = states[index];
    const screen = document.createElement("div");
    screen.className = `screen ${mode.className}`;
    screen.dataset.modeIndex = String(index);
    screen.setAttribute("aria-label", `${mode.name}模式效果图`);

    screen.innerHTML = `
            <div class="ticks"></div>
      ${mode.key === "light" ? '<div class="brightness-photo"><img src="brightness_bg.png" alt=""></div>' : ""}
      ${mode.key === "color-temp" ? '<div class="color-temp-photo"><img src="color_temp_bg.png" alt=""></div><div class="color-temp-knob"></div>' : ""}
      ${mode.iconHTML}
      ${valueDisplayHTML(mode, state)}
      ${mode.hasFan ? fanAreaHTML() : ""}
      ${mode.bottomHTML}
      <div class="toast"></div>
      <div class="glass"></div>
    `;

    if (mode.key === "color-temp") {
      const photo = screen.querySelector(".brightness-photo");
      if (photo) {
        photo.className = "color-temp-photo";
        const img = photo.querySelector("img");
        if (img) img.src = "color_temp_bg.png";
      }
    }

    if (mode.key === "light") {
      const beam = document.createElement("div");
      beam.className = "brightness-beam";
      screen.appendChild(beam);

      const lamp = document.createElement("div");
      lamp.className = "brightness-lamp";
      lamp.innerHTML = '';
      screen.appendChild(lamp);
    }

    const ticks = screen.querySelector(".ticks");
    for (let i = 0; i < STEP_COUNT; i++) {
      const el = document.createElement("div");
      el.className = "tick";
      const angle = START_ANGLE + (END_ANGLE - START_ANGLE) * i / (STEP_COUNT - 1);
      el.style.transform = `rotate(${angle}deg)`;
      el.dataset.index = String(i);
      el.dataset.value = String(valueFromIndex(mode, i));
      el.title = `${el.dataset.value}${mode.unit}`;

      el.addEventListener("click", (event) => {
        event.stopPropagation();
        setValue(screen, Number(el.dataset.value));
      });

      ticks.appendChild(el);
    }

    return screen;
  }

  function valueFromIndex(mode, index) {
    return mode.valueFromIndex(index);
  }

  function indexFromValue(mode, value) {
    let nearest = 0;
    let bestDiff = Infinity;

    for (let i = 0; i < STEP_COUNT; i++) {
      const item = valueFromIndex(mode, i);
      const diff = Math.abs(item - value);
      if (diff < bestDiff) {
        bestDiff = diff;
        nearest = i;
      }
    }

    return nearest;
  }

  function setValue(screen, value) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];
    const state = states[index];

    const currentIndex = indexFromValue(mode, value);
    state.value = valueFromIndex(mode, currentIndex);

    const currentColor = mode.tickColor(currentIndex);
    const temp = screen.querySelector(".temp");
    const tail = screen.querySelector(".temp-tail");
    const unit = screen.querySelector(".unit");

    if (mode.key === "color-temp") {
      const text = String(state.value);
      temp.textContent = text.slice(0, 2);
      if (tail) tail.textContent = text.slice(2);
      if (unit) unit.style.display = "";
    } else if (mode.key === "light" && state.value === 0) {
      temp.textContent = "OFF";
      temp.classList.add("off-text");
      if (unit) unit.style.display = "none";
    } else {
      temp.textContent = String(state.value);
      temp.classList.remove("off-text");
      if (unit) unit.style.display = "";
    }

    temp.style.color = currentColor;
    temp.style.textShadow = `0 0 10px ${currentColor}`;

    if ((mode.key === "color-temp" || mode.key === "light") && unit) {
      unit.style.color = currentColor;
      unit.style.textShadow = `0 0 9px ${currentColor}`;
    } else if (unit) {
      unit.style.color = "";
      unit.style.textShadow = "";
    }

    if (tail) {
      tail.style.color = currentColor;
      tail.style.textShadow = `0 0 9px ${currentColor}`;
    }

    setCircleVisual(screen, mode, currentIndex, currentColor);

    const litCount = currentIndex + 1;
    [...screen.querySelectorAll(".tick")].forEach((el, tickIndex) => {
      const isLit = tickIndex < litCount;
      const isSelected = tickIndex === litCount - 1;
      const activeColor = mode.tickColor(tickIndex);

      el.classList.toggle("selected", isSelected);

      if (isLit) {
        el.style.background = activeColor;
        el.style.boxShadow = `0 0 ${isSelected ? 10 : 7}px ${activeColor}`;
        el.style.opacity = isSelected ? "1" : ".92";
      } else {
        el.style.background = "rgba(255,255,255,.10)";
        el.style.boxShadow = "none";
        el.style.opacity = ".38";
      }
    });
  }


  function withAlpha(color, alpha) {
    const a = Math.max(0, Math.min(1, alpha));
    if (color.startsWith("rgb(")) {
      return color.replace("rgb(", "rgba(").replace(")", `, ${a})`);
    }
    if (color.startsWith("rgba(")) {
      const parts = color.slice(5, -1).split(",").map(s => s.trim());
      return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${a})`;
    }
    if (color.startsWith("hsl(")) {
      const inner = color.slice(4, -1);
      return `hsl(${inner} / ${a})`;
    }
    return color;
  }

  function setCircleVisual(screen, mode, currentIndex, currentColor) {
    const t = currentIndex / (STEP_COUNT - 1);

    if (mode.key === "light") {
      /* v24：OFF 状态完全无光束；有亮度后再逐渐出现光束 */
      const roomBrightness = 0.70;
      const isOff = t <= 0.0001;
      const beamOpacity = isOff ? 0 : (0.28 + t * 0.72);
      const beamCore = isOff ? 0 : (0.16 + t * 0.60);
      const lampGlow = isOff ? 0 : (0.20 + t * 0.42);
      const valueOpacity = 0.72 + t * 0.28;
      const valueGlow = 0.10 + t * 0.60;

      screen.style.setProperty("--dynamic-surface-1", "rgba(255,255,255,0)");
      screen.style.setProperty("--dynamic-surface-2", "rgba(255,255,255,0)");
      screen.style.setProperty("--dynamic-glow-inner", withAlpha("rgb(255, 236, 196)", 0.05));
      screen.style.setProperty("--dynamic-glow-outer", withAlpha("rgb(255, 228, 168)", 0.04));

      screen.style.setProperty("--room-brightness", roomBrightness.toFixed(3));
      screen.style.setProperty("--beam-opacity", beamOpacity.toFixed(3));
      screen.style.setProperty("--beam-core", beamCore.toFixed(3));
      screen.style.setProperty("--lamp-glow", lampGlow.toFixed(3));
      screen.style.setProperty("--value-opacity", valueOpacity.toFixed(3));
      screen.style.setProperty("--value-glow", valueGlow.toFixed(3));
      return;
    }

    if (mode.key === "color-temp") {
      const surface1 = withAlpha(currentColor, 0.12 + t * 0.10);
      const surface2 = withAlpha(currentColor, 0.05 + t * 0.06);
      const glowInner = withAlpha(currentColor, 0.10 + t * 0.12);
      const glowOuter = withAlpha(currentColor, 0.06 + t * 0.10);
      const warmFactor = Math.max(0, 1 - t / 0.52);
      const coolFactor = Math.max(0, (t - 0.52) / 0.48) * 0.55;
      const angle = START_ANGLE + (END_ANGLE - START_ANGLE) * t;

      screen.style.setProperty("--dynamic-surface-1", surface1);
      screen.style.setProperty("--dynamic-surface-2", surface2);
      screen.style.setProperty("--dynamic-glow-inner", glowInner);
      screen.style.setProperty("--dynamic-glow-outer", glowOuter);

      screen.style.setProperty("--ct-knob-angle", `${angle}deg`);
      screen.style.setProperty("--ct-knob-color", currentColor);
      screen.style.setProperty("--ct-photo-brightness", (0.72 + t * 0.12).toFixed(3));
      screen.style.setProperty("--ct-photo-saturate", (1.00 + t * 0.16).toFixed(3));
      screen.style.setProperty("--ct-photo-sepia", (0.20 * warmFactor).toFixed(3));
      screen.style.setProperty("--ct-photo-warm-opacity", (0.10 + 0.24 * warmFactor).toFixed(3));
      screen.style.setProperty("--ct-photo-cool-opacity", (0.06 + 0.24 * coolFactor).toFixed(3));
      return;
    }

    screen.style.setProperty("--dynamic-surface-1", "rgba(255,255,255,0)");
    screen.style.setProperty("--dynamic-surface-2", "rgba(255,255,255,0)");
    screen.style.setProperty("--dynamic-glow-inner", "rgba(255,255,255,0)");
    screen.style.setProperty("--dynamic-glow-outer", "rgba(255,255,255,0)");
  }

  function updateFanSpeed(screen, show = false) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];
    if (!mode.hasFan) return;

    const state = states[index];
    const barColors = mode.fanBarColors;
    const color = barColors[state.speed - 1];

    const fan = screen.querySelector(".fan");
    if (fan) {
      fan.style.animationDuration = `${fanDurations[state.speed]}s`;
      fan.style.filter = `drop-shadow(0 0 5px ${color})`;
    }

    screen.querySelectorAll(".fan-blade").forEach((blade) => {
      blade.style.fill = color;
    });

    const fanCore = screen.querySelector(".fan-core");
    if (fanCore) fanCore.style.fill = color;

    [...screen.querySelectorAll(".fan-bars b")].forEach((bar, barIndex) => {
      const on = barIndex < state.speed;
      const barColor = barColors[barIndex] || color;
      bar.classList.toggle("on", on);
      bar.style.background = on ? barColor : "rgba(170, 210, 235, .46)";
      bar.style.boxShadow = on
        ? `0 0 5px ${barColor}, inset 0 0 0 1px rgba(255,255,255,.12)`
        : "inset 0 0 0 1px rgba(255,255,255,.06)";
    });
  }

  function valueFromPointer(screen, event) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];

    const rect = screen.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;

    let angle = Math.atan2(dx, -dy) * 180 / Math.PI;
    angle = Math.max(START_ANGLE, Math.min(END_ANGLE, angle));

    const ratio = (angle - START_ANGLE) / (END_ANGLE - START_ANGLE);
    const valueIndex = Math.round(ratio * (STEP_COUNT - 1));
    return valueFromIndex(mode, valueIndex);
  }

  function pointerInArcArea(screen, event) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];

    const rect = screen.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;
    const radius = Math.hypot(dx, dy);
    return radius >= 78 && radius <= 116;
  }

  function setSpeedFromClientX(screen, clientX, show = true) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];
    if (!mode.hasFan) return;

    const area = screen.querySelector(".fan-area");
    const rect = area.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width - 0.01, clientX - rect.left));
    const nextLevel = Math.floor((x / rect.width) * 7) + 1;
    const state = states[index];

    if (nextLevel !== state.speed) {
      state.speed = nextLevel;
      updateFanSpeed(screen, show);
    } else if (show) {
      updateFanSpeed(screen, true);
    }
  }

  function currentTranslate() {
    return -modeIndex * SLIDE_STEP;
  }

  function setSliderTranslate(x, animate = true) {
    slider.style.transition = animate ? "transform .34s cubic-bezier(.22,.78,.22,1)" : "none";
    slider.style.transform = `translateX(${x}px)`;
  }

  function switchTo(index) {
    modeIndex = ((index % modes.length) + modes.length) % modes.length;
    setSliderTranslate(currentTranslate(), true);
    updateActiveScreens();
  }


  function updateActiveScreens() {
    [...document.querySelectorAll(".screen")].forEach((screen, index) => {
      screen.classList.toggle("is-current", index === modeIndex);
      screen.classList.toggle("is-away", index !== modeIndex);
    });
  }

  modes.forEach((mode, index) => {
    slider.appendChild(createScreen(mode, index));
  });

  [...document.querySelectorAll(".screen")].forEach((screen) => {
    setValue(screen, states[Number(screen.dataset.modeIndex)].value);
    updateFanSpeed(screen, false);
  });

  setSliderTranslate(0, false);
  updateActiveScreens();

  slider.addEventListener("pointerdown", (event) => {
    const screen = event.target.closest(".screen");
    if (!screen) return;

    activeScreen = screen;
    activePointerId = event.pointerId;
    startX = event.clientX;
    startY = event.clientY;
    startTranslate = currentTranslate();

    if (event.target.closest(".fan-area")) {
      event.preventDefault();
      isSpeedDragging = true;
      setSpeedFromClientX(screen, event.clientX, true);
      try { slider.setPointerCapture(event.pointerId); } catch (_) {}
      return;
    }

    if (pointerInArcArea(screen, event)) {
      event.preventDefault();
      isValueDragging = true;
      setValue(screen, valueFromPointer(screen, event));
      try { slider.setPointerCapture(event.pointerId); } catch (_) {}
      return;
    }

    event.preventDefault();
    isSwiping = true;
    setSliderTranslate(startTranslate, false);
    try { slider.setPointerCapture(event.pointerId); } catch (_) {}
  });

  slider.addEventListener("pointermove", (event) => {
    if (activePointerId !== event.pointerId || !activeScreen) return;

    if (isSpeedDragging) {
      event.preventDefault();
      setSpeedFromClientX(activeScreen, event.clientX, false);
      return;
    }

    if (isValueDragging) {
      event.preventDefault();
      setValue(activeScreen, valueFromPointer(activeScreen, event));
      return;
    }

    if (isSwiping) {
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;
      if (Math.abs(dx) > Math.abs(dy)) {
        event.preventDefault();
        setSliderTranslate(startTranslate + dx, false);
      }
    }
  }, { passive: false });

  slider.addEventListener("pointerup", (event) => {
    if (activePointerId !== event.pointerId) return;

    if (isSpeedDragging) {
      updateFanSpeed(activeScreen, true);
    }

    if (isSwiping) {
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;

      if (Math.abs(dx) >= 42 && Math.abs(dx) > Math.abs(dy) * 1.2) {
        if (dx < 0) {
          switchTo(modeIndex + 1);
        } else {
          switchTo(modeIndex - 1);
        }
      } else {
        setSliderTranslate(currentTranslate(), true);
      }
    }

    isSwiping = false;
    isValueDragging = false;
    isSpeedDragging = false;
    activeScreen = null;
    activePointerId = null;
  });

  slider.addEventListener("pointercancel", () => {
    isSwiping = false;
    isValueDragging = false;
    isSpeedDragging = false;
    activeScreen = null;
    activePointerId = null;
    setSliderTranslate(currentTranslate(), true);
  });

  // v14：强制把色温页背景替换成用户最新上传的吊灯客厅图
  function forceColorTempImageV14() {
    document.querySelectorAll(".color-temp-screen .color-temp-photo img").forEach((img) => {
      img.src = "color_temp_bg.png";
      img.style.objectPosition = "center center";
      img.style.objectFit = "cover";
    });
  }
  forceColorTempImageV14();
  window.addEventListener("load", forceColorTempImageV14);
  setTimeout(forceColorTempImageV14, 300);


  // v15：强制把亮度页背景替换成用户最新上传的矩形吊灯客厅图
  function forceBrightnessImageV15() {
    document.querySelectorAll(".light-screen .brightness-photo img").forEach((img) => {
      img.src = "brightness_bg.png";
      img.style.objectFit = "cover";
      img.style.objectPosition = "center top";
    });
  }
  forceBrightnessImageV15();
  window.addEventListener("load", forceBrightnessImageV15);
  setTimeout(forceBrightnessImageV15, 300);


  // v16：给亮度模式图片里的灯添加光晕和下射光束
  function enhanceBrightnessPhotoBeamV16() {
    document.querySelectorAll('.light-screen .brightness-photo').forEach((photo) => {
      if (!photo.querySelector('.in-image-lamp-glow')) {
        const glow = document.createElement('div');
        glow.className = 'in-image-lamp-glow';
        photo.appendChild(glow);
      }
      if (!photo.querySelector('.in-image-beam')) {
        const beam = document.createElement('div');
        beam.className = 'in-image-beam';
        photo.appendChild(beam);
      }
    });
  }
  enhanceBrightnessPhotoBeamV16();
  window.addEventListener('load', enhanceBrightnessPhotoBeamV16);
  setTimeout(enhanceBrightnessPhotoBeamV16, 200);


  // v19：添加遮罩层压掉原图自带光束
  function hideOriginalBeamV19() {
    document.querySelectorAll('.light-screen .brightness-photo').forEach((photo) => {
      if (!photo.querySelector('.original-beam-cover')) {
        const cover = document.createElement('div');
        cover.className = 'original-beam-cover';
        const beam = photo.querySelector('.in-image-beam');
        if (beam) {
          photo.insertBefore(cover, beam);
        } else {
          photo.appendChild(cover);
        }
      }
    });
  }
  hideOriginalBeamV19();
  window.addEventListener('load', hideOriginalBeamV19);
  setTimeout(hideOriginalBeamV19, 300);


  // v22：使用柔和处理后的亮度背景，避免黑块
  function forceBrightnessImageV22() {
    document.querySelectorAll(".light-screen .brightness-photo img").forEach((img) => {
      img.src = "brightness_bg.png";
      img.style.objectFit = "cover";
      img.style.objectPosition = "center top";
    });
  }
  forceBrightnessImageV22();
  window.addEventListener("load", forceBrightnessImageV22);
  setTimeout(forceBrightnessImageV22, 300);

</script>
