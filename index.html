<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>240×240 空调四模式整圆滑动效果</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #111;
    display: grid;
    place-items: center;
    overflow: hidden;
    font-family: Arial, "Microsoft YaHei", sans-serif;
  }

  .viewport {
    width: 240px;
    height: 240px;
    position: relative;
    overflow: visible;
    touch-action: none;
  }

  .slider {
    position: absolute;
    left: 0;
    top: 0;
    height: 240px;
    display: flex;
    gap: 26px;
    will-change: transform;
    transition: transform .34s cubic-bezier(.22,.78,.22,1);
  }

  .screen {
    position: relative;
    width: 240px;
    height: 240px;
    flex: 0 0 240px;
    border-radius: 50%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 38%, rgba(35,90,140,.18), transparent 40%),
      radial-gradient(circle at 50% 52%, #071019 0%, #02070d 62%, #000 100%);
    border: 3px solid #585f67;
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,.03),
      inset 0 0 24px rgba(0,170,255,.10),
      0 0 18px rgba(0,0,0,.8);
    user-select: none;
    touch-action: none;
  }

  .ticks {
    position: absolute;
    inset: 0;
    z-index: 7;
  }

  .tick {
    position: absolute;
    left: 117px;
    top: 19px;
    width: 7px;
    height: 15px;
    border-radius: 7px;
    transform-origin: 3.5px 101px;
    cursor: pointer;
    transition: top .12s, height .12s, opacity .12s, filter .12s, background .12s, box-shadow .12s;
    background: rgba(255,255,255,.10);
    opacity: .38;
    box-shadow: none;
  }

  .tick.selected {
    top: 19px;
    height: 15px;
    opacity: 1 !important;
    filter: brightness(1.30);
    outline: 1px solid rgba(255,255,255,.92);
    outline-offset: 1px;
  }

  .mode-icon {
    position: absolute;
    top: 49px;
    left: 50%;
    transform: translateX(-50%);
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    z-index: 4;
    pointer-events: none;
  }

  .mode-icon.text-icon {
    width: auto;
    height: auto;
    line-height: 1;
  }

  .mode-icon-svg {
    width: 40px;
    height: 40px;
    overflow: visible;
    display: block;
  }

  .temp-group {
    position: absolute;
    top: 92px;
    left: calc(50% - 13px);
    transform: translateX(-50%);
    width: 142px;
    height: 72px;
    z-index: 4;
    pointer-events: none;
  }

  .temp {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 71px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -4px;
    text-shadow: 0 0 10px rgba(95,195,255,.78);
    white-space: nowrap;
    transition: color .18s ease, text-shadow .18s ease;
  }

  .unit {
    position: absolute;
    top: 14px;
    left: calc(50% + 43px);
    font-size: 23px;
    color: #fff;
    text-shadow: 0 0 8px rgba(95,195,255,.78);
    white-space: nowrap;
  }

  .fan-area {
    position: absolute;
    top: 132px;
    left: 126px;
    width: 98px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 5px;
    z-index: 12;
    cursor: ew-resize;
    padding: 10px 8px;
    border-radius: 18px;
    overflow: visible;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .fan-area:active {
    background: rgba(70,190,255,.10);
  }

  .fan {
    width: 18px;
    height: 18px;
    display: grid;
    place-items: center;
    animation: spin 1.25s linear infinite;
    filter: drop-shadow(0 0 5px rgba(120,210,255,.78));
    flex: 0 0 auto;
    margin-left: 3px;
  }

  .fan-svg {
    width: 18px;
    height: 18px;
    overflow: visible;
  }

  .fan-blade {
    fill: rgba(255,255,255,.96);
    transition: fill .18s ease;
  }

  .fan-core {
    fill: rgba(255,255,255,1);
    transition: fill .18s ease;
  }

  .fan-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 22px;
    width: 38px;
    overflow: visible;
    flex: 0 0 auto;
  }

  .fan-bars b {
    display: block;
    width: 2px;
    border-radius: 2px;
    background: rgba(170, 210, 235, .46);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    transition: background .15s, box-shadow .15s, opacity .15s;
    opacity: .98;
    flex: 0 0 auto;
  }

  .fan-bars b:nth-child(1) { height: 8px; }
  .fan-bars b:nth-child(2) { height: 10px; }
  .fan-bars b:nth-child(3) { height: 12px; }
  .fan-bars b:nth-child(4) { height: 14px; }
  .fan-bars b:nth-child(5) { height: 16px; }
  .fan-bars b:nth-child(6) { height: 18px; }
  .fan-bars b:nth-child(7) { height: 20px; }

  .fan-bars b.on {
    opacity: 1;
  }

  .room {
    position: absolute;
    left: 50%;
    bottom: 31px;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    color: #fff;
    font-size: 20px;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(95,195,255,.75);
    z-index: 5;
  }

  .home-icon {
    width: 26px;
    height: 26px;
    flex: 0 0 auto;
    filter: drop-shadow(0 0 5px rgba(120,210,255,.75));
  }

  .toast {
    position: absolute;
    left: 50%;
    bottom: 61px;
    transform: translateX(-50%);
    min-width: 68px;
    padding: 4px 9px;
    border-radius: 12px;
    background: rgba(0,20,35,.64);
    color: #e8f8ff;
    font-size: 11px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease;
    z-index: 12;
  }

  .toast.show { opacity: 1; }

  .glass {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background:
      linear-gradient(145deg, rgba(255,255,255,.07), transparent 26%),
      radial-gradient(circle at 64% 14%, rgba(255,255,255,.045), transparent 18%);
    pointer-events: none;
    z-index: 20;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="viewport" id="viewport" aria-label="空调四模式整圆左滑切换">
  <div class="slider" id="slider"></div>
</div>

<script>
  const MIN_TEMP = 16;
  const MAX_TEMP = 32;
  const STEP_COUNT = MAX_TEMP - MIN_TEMP + 1;
  const ARC_HALF_ANGLE = 122;
  const START_ANGLE = -ARC_HALF_ANGLE;
  const END_ANGLE = ARC_HALF_ANGLE;
  const SLIDE_GAP = 26;
  const SLIDE_STEP = 240 + SLIDE_GAP;

  const slider = document.getElementById("slider");
  const viewport = document.getElementById("viewport");

  const modes = [
    {
      name: "制冷",
      iconType: "text",
      iconHTML: "❄",
      iconStyle: {
        color: "#33dfff",
        fontSize: "37px",
        textShadow: "0 0 11px #00bfff",
        filter: "none"
      },
      tickColor(index) {
        const t = index / (STEP_COUNT - 1);
        const hue = 188 - t * 128;
        return `hsl(${hue} 100% 58%)`;
      },
      fanBarColors: ["#0a84ff", "#34a0ff", "#22b8ff", "#5ad0ff", "#3fd9c6", "#6be6b8", "#30d158"]
    },
    {
      name: "制热",
      iconType: "text",
      iconHTML: "☀",
      iconStyle: {
        color: "#ff9a1f",
        fontSize: "37px",
        textShadow: "0 0 8px rgba(255, 140, 0, 0.95), 0 0 16px rgba(255, 94, 0, 0.72), 0 0 24px rgba(255, 120, 20, 0.45)",
        filter: "none"
      },
      tickColor(index) {
        const t = index / (STEP_COUNT - 1);
        const hue = 50 - t * 22;
        const lightness = 60 - t * 6;
        return `hsl(${hue} 100% ${lightness}%)`;
      },
      fanBarColors: ["#ffd95a", "#ffcf3a", "#ffbe2e", "#ffb01f", "#ffa21a", "#ff9214", "#ff7a0f"]
    },
    {
      name: "新风",
      iconType: "svg",
      iconHTML: `
        <svg class="mode-icon-svg" viewBox="0 0 48 48" aria-hidden="true">
          <g transform="translate(24 24)">
            <path fill="#1edcff" d="M1.2 -1.1
              C 2.8 -7.8, 7.0 -12.8, 11.5 -14.0
              C 14.4 -14.8, 17.1 -13.6, 18.5 -11.0
              C 20.0 -8.2, 19.4 -4.8, 17.0 -2.0
              C 14.0 1.4, 9.0 3.5, 4.8 3.0
              C 2.0 2.7, 0.1 1.2, -0.2 -0.8
              C -0.4 -2.0, 0.0 -2.6, 1.2 -1.1 Z"/>
            <path fill="#1edcff" d="M1.2 -1.1
              C 2.8 -7.8, 7.0 -12.8, 11.5 -14.0
              C 14.4 -14.8, 17.1 -13.6, 18.5 -11.0
              C 20.0 -8.2, 19.4 -4.8, 17.0 -2.0
              C 14.0 1.4, 9.0 3.5, 4.8 3.0
              C 2.0 2.7, 0.1 1.2, -0.2 -0.8
              C -0.4 -2.0, 0.0 -2.6, 1.2 -1.1 Z" transform="rotate(120)"/>
            <path fill="#1edcff" d="M1.2 -1.1
              C 2.8 -7.8, 7.0 -12.8, 11.5 -14.0
              C 14.4 -14.8, 17.1 -13.6, 18.5 -11.0
              C 20.0 -8.2, 19.4 -4.8, 17.0 -2.0
              C 14.0 1.4, 9.0 3.5, 4.8 3.0
              C 2.0 2.7, 0.1 1.2, -0.2 -0.8
              C -0.4 -2.0, 0.0 -2.6, 1.2 -1.1 Z" transform="rotate(240)"/>
          </g>
        </svg>
      `,
      iconStyle: {
        color: "#1edcff",
        fontSize: "0",
        textShadow: "none",
        filter: "drop-shadow(0 0 6px rgba(30, 220, 255, 0.92)) drop-shadow(0 0 14px rgba(0, 190, 255, 0.40))"
      },
      tickColor(index) {
        const t = index / (STEP_COUNT - 1);
        const hue = 192 - t * 42;
        const lightness = 60 - t * 4;
        return `hsl(${hue} 90% ${lightness}%)`;
      },
      fanBarColors: ["#59d7ff", "#7fe4ff", "#4ed7ea", "#73e3ea", "#48d8c2", "#70e4c9", "#6fdf8f"]
    },
    {
      name: "除湿",
      iconType: "svg",
      iconHTML: `
        <svg class="mode-icon-svg" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#22f0a8" d="M12.8 7.8
            C12.8 7.8 5.8 16.2 5.8 21.3
            C5.8 26.8 9.1 30.6 13.1 30.6
            C17.0 30.6 20.3 26.8 20.3 21.3
            C20.3 16.2 12.8 7.8 12.8 7.8 Z"/>
          <path fill="#22f0a8" d="M35.0 5.8
            C35.0 5.8 29.1 12.9 29.1 17.2
            C29.1 21.8 31.9 25.0 35.4 25.0
            C38.8 25.0 41.7 21.8 41.7 17.2
            C41.7 12.9 35.0 5.8 35.0 5.8 Z"/>
          <path fill="#22f0a8" d="M24.0 22.8
            C24.0 22.8 16.2 32.2 16.2 38.1
            C16.2 44.4 20.0 48.6 24.6 48.6
            C29.1 48.6 32.9 44.4 32.9 38.1
            C32.9 32.2 24.0 22.8 24.0 22.8 Z"/>
        </svg>
      `,
      iconStyle: {
        color: "#22f0a8",
        fontSize: "0",
        textShadow: "none",
        filter: "drop-shadow(0 0 6px rgba(35, 255, 185, 0.95)) drop-shadow(0 0 14px rgba(0, 230, 155, 0.50))"
      },
      tickColor(index) {
        const t = index / (STEP_COUNT - 1);
        const hue = 156 + t * 42;
        const saturation = 92 - t * 6;
        const lightness = 58 - t * 4;
        return `hsl(${hue} ${saturation}% ${lightness}%)`;
      },
      fanBarColors: ["#69ddff", "#8be8ff", "#4ecff0", "#72dcf5", "#47cfcf", "#6fddd8", "#51b7ff"]
    }
  ];

  const fanDurations = {
    1: 2.80,
    2: 2.20,
    3: 1.70,
    4: 1.25,
    5: 0.95,
    6: 0.70,
    7: 0.48
  };

  const states = modes.map(() => ({ temp: 29, speed: 4 }));
  let modeIndex = 0;
  let startX = 0;
  let startY = 0;
  let startTranslate = 0;
  let isSwiping = false;
  let isTempDragging = false;
  let isSpeedDragging = false;
  let activeScreen = null;
  let activePointerId = null;

  function homeIcon() {
    return `
      <svg class="home-icon" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M5 15.5L16 6l11 9.5" fill="none" stroke="white" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M8.5 14.5V26h15V14.5" fill="none" stroke="white" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13.5 26v-8h5v8" fill="none" stroke="white" stroke-width="3"
              stroke-linejoin="round"/>
      </svg>
    `;
  }

  function fanIcon() {
    return `
      <svg class="fan-svg" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="1.9" class="fan-core"/>
        <path d="M12 3.1c2.7 0 4.3 1.2 4.3 2.8 0 1.9-1.8 3.6-4.9 4.4-.6.2-1-.1-1.1-.7-.4-2.5-.2-4.5.6-5.6.3-.5.7-.9 1.1-.9z" class="fan-blade"/>
        <path d="M20.9 12c0 2.7-1.2 4.3-2.8 4.3-1.9 0-3.6-1.8-4.4-4.9-.2-.6.1-1 .7-1.1 2.5-.4 4.5-.2 5.6.6.5.3.9.7.9 1.1z" class="fan-blade"/>
        <path d="M12 20.9c-2.7 0-4.3-1.2-4.3-2.8 0-1.9 1.8-3.6 4.9-4.4.6-.2 1 .1 1.1.7.4 2.5.2 4.5-.6 5.6-.3.5-.7.9-1.1.9z" class="fan-blade"/>
        <path d="M3.1 12c0-2.7 1.2-4.3 2.8-4.3 1.9 0 3.6 1.8 4.4 4.9.2.6-.1 1-.7 1.1-2.5.4-4.5.2-5.6-.6-.5-.3-.9-.7-.9-1.1z" class="fan-blade"/>
      </svg>
    `;
  }

  function createScreen(mode, index) {
    const screen = document.createElement("div");
    screen.className = "screen";
    screen.dataset.modeIndex = String(index);
    screen.setAttribute("aria-label", `空调${mode.name}模式效果图`);

    screen.innerHTML = `
      <div class="ticks"></div>
      <div class="mode-icon ${mode.iconType === "text" ? "text-icon" : ""}">${mode.iconHTML}</div>
      <div class="temp-group">
        <div class="temp">29</div>
        <div class="unit">°C</div>
      </div>
      <div class="fan-area" title="点击或拖动切换风速">
        <div class="fan" aria-hidden="true">${fanIcon()}</div>
        <div class="fan-bars"><b></b><b></b><b></b><b></b><b></b><b></b><b></b></div>
      </div>
      <div class="room">${homeIcon()}<div>28.6°C</div></div>
      <div class="toast"></div>
      <div class="glass"></div>
    `;

    const icon = screen.querySelector(".mode-icon");
    icon.style.color = mode.iconStyle.color;
    icon.style.fontSize = mode.iconStyle.fontSize;
    icon.style.textShadow = mode.iconStyle.textShadow;
    icon.style.filter = mode.iconStyle.filter;

    const ticks = screen.querySelector(".ticks");
    for (let i = 0; i < STEP_COUNT; i++) {
      const el = document.createElement("div");
      el.className = "tick";
      const angle = START_ANGLE + (END_ANGLE - START_ANGLE) * i / (STEP_COUNT - 1);
      el.style.transform = `rotate(${angle}deg)`;
      el.dataset.temp = String(MIN_TEMP + i);
      el.title = `${MIN_TEMP + i}°C`;
      el.addEventListener("click", (event) => {
        event.stopPropagation();
        setTemperature(screen, Number(el.dataset.temp));
      });
      ticks.appendChild(el);
    }

    return screen;
  }

  function currentTranslate() {
    return -modeIndex * SLIDE_STEP;
  }

  function setSliderTranslate(x, animate = true) {
    slider.style.transition = animate ? "transform .34s cubic-bezier(.22,.78,.22,1)" : "none";
    slider.style.transform = `translateX(${x}px)`;
  }

  function switchTo(index) {
    modeIndex = ((index % modes.length) + modes.length) % modes.length;
    setSliderTranslate(currentTranslate(), true);
  }

  function updateAllScreens() {
    [...document.querySelectorAll(".screen")].forEach((screen) => {
      setTemperature(screen, states[Number(screen.dataset.modeIndex)].temp, false);
      updateFanSpeed(screen, false);
    });
  }

  function setTemperature(screen, value) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];
    const state = states[index];

    state.temp = Math.max(MIN_TEMP, Math.min(MAX_TEMP, Math.round(value)));
    const tempValue = screen.querySelector(".temp");
    tempValue.textContent = String(state.temp);

    const litCount = state.temp - MIN_TEMP + 1;
    const currentIndex = state.temp - MIN_TEMP;
    const currentColor = mode.tickColor(currentIndex);

    tempValue.style.color = currentColor;
    tempValue.style.textShadow = `0 0 10px ${currentColor}`;

    [...screen.querySelectorAll(".tick")].forEach((el, tickIndex) => {
      const isLit = tickIndex < litCount;
      const isSelected = tickIndex === litCount - 1;
      const activeColor = mode.tickColor(tickIndex);

      el.classList.toggle("selected", isSelected);

      if (isLit) {
        el.style.background = activeColor;
        el.style.boxShadow = `0 0 ${isSelected ? 10 : 7}px ${activeColor}`;
        el.style.opacity = isSelected ? "1" : ".92";
      } else {
        el.style.background = "rgba(255,255,255,.10)";
        el.style.boxShadow = "none";
        el.style.opacity = ".38";
      }
    });
  }

  function updateFanSpeed(screen, show = false) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];
    const state = states[index];
    const barColors = mode.fanBarColors;
    const color = barColors[state.speed - 1];

    const fan = screen.querySelector(".fan");
    fan.style.animationDuration = `${fanDurations[state.speed]}s`;
    fan.style.filter = `drop-shadow(0 0 5px ${color})`;

    screen.querySelectorAll(".fan-blade").forEach((blade) => {
      blade.style.fill = color;
    });

    const fanCore = screen.querySelector(".fan-core");
    if (fanCore) fanCore.style.fill = color;

    [...screen.querySelectorAll(".fan-bars b")].forEach((bar, barIndex) => {
      const on = barIndex < state.speed;
      const barColor = barColors[barIndex] || color;
      bar.classList.toggle("on", on);
      bar.style.background = on ? barColor : "rgba(170, 210, 235, .46)";
      bar.style.boxShadow = on
        ? `0 0 5px ${barColor}, inset 0 0 0 1px rgba(255,255,255,.12)`
        : "inset 0 0 0 1px rgba(255,255,255,.06)";
    });

    if (show) {
      const toast = screen.querySelector(".toast");
      toast.textContent = `风速 ${state.speed} 档`;
      toast.classList.add("show");
      clearTimeout(screen._toastTimer);
      screen._toastTimer = setTimeout(() => toast.classList.remove("show"), 850);
    }
  }

  function temperatureFromPointer(screen, event) {
    const rect = screen.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;

    let angle = Math.atan2(dx, -dy) * 180 / Math.PI;
    angle = Math.max(START_ANGLE, Math.min(END_ANGLE, angle));

    const ratio = (angle - START_ANGLE) / (END_ANGLE - START_ANGLE);
    return MIN_TEMP + Math.round(ratio * (STEP_COUNT - 1));
  }

  function pointerInArcArea(screen, event) {
    const rect = screen.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;
    const radius = Math.hypot(dx, dy);
    return radius >= 78 && radius <= 116;
  }

  function setSpeedFromClientX(screen, clientX, show = true) {
    const area = screen.querySelector(".fan-area");
    const rect = area.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width - 0.01, clientX - rect.left));
    const nextLevel = Math.floor((x / rect.width) * 7) + 1;
    const state = states[Number(screen.dataset.modeIndex)];

    if (nextLevel !== state.speed) {
      state.speed = nextLevel;
      updateFanSpeed(screen, show);
    } else if (show) {
      updateFanSpeed(screen, true);
    }
  }

  modes.forEach((mode, index) => {
    slider.appendChild(createScreen(mode, index));
  });

  updateAllScreens();
  setSliderTranslate(0, false);

  slider.addEventListener("pointerdown", (event) => {
    const screen = event.target.closest(".screen");
    if (!screen) return;

    activeScreen = screen;
    activePointerId = event.pointerId;
    startX = event.clientX;
    startY = event.clientY;
    startTranslate = currentTranslate();

    if (event.target.closest(".fan-area")) {
      event.preventDefault();
      isSpeedDragging = true;
      setSpeedFromClientX(screen, event.clientX, true);
      try { slider.setPointerCapture(event.pointerId); } catch (_) {}
      return;
    }

    if (pointerInArcArea(screen, event)) {
      event.preventDefault();
      isTempDragging = true;
      setTemperature(screen, temperatureFromPointer(screen, event));
      try { slider.setPointerCapture(event.pointerId); } catch (_) {}
      return;
    }

    event.preventDefault();
    isSwiping = true;
    setSliderTranslate(startTranslate, false);
    try { slider.setPointerCapture(event.pointerId); } catch (_) {}
  });

  slider.addEventListener("pointermove", (event) => {
    if (activePointerId !== event.pointerId || !activeScreen) return;

    if (isSpeedDragging) {
      event.preventDefault();
      setSpeedFromClientX(activeScreen, event.clientX, false);
      return;
    }

    if (isTempDragging) {
      event.preventDefault();
      setTemperature(activeScreen, temperatureFromPointer(activeScreen, event));
      return;
    }

    if (isSwiping) {
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;
      if (Math.abs(dx) > Math.abs(dy)) {
        event.preventDefault();
        setSliderTranslate(startTranslate + dx, false);
      }
    }
  }, { passive: false });

  slider.addEventListener("pointerup", (event) => {
    if (activePointerId !== event.pointerId) return;

    if (isSpeedDragging) {
      updateFanSpeed(activeScreen, true);
    }

    if (isSwiping) {
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;

      // 单纯左滑切换整圆：制冷 → 制热 → 新风 → 除湿 → 制冷
      if (Math.abs(dx) >= 42 && Math.abs(dx) > Math.abs(dy) * 1.2 && dx < 0) {
        switchTo(modeIndex + 1);
      } else {
        setSliderTranslate(currentTranslate(), true);
      }
    }

    isSwiping = false;
    isTempDragging = false;
    isSpeedDragging = false;
    activeScreen = null;
    activePointerId = null;
  });

  slider.addEventListener("pointercancel", () => {
    isSwiping = false;
    isTempDragging = false;
    isSpeedDragging = false;
    activeScreen = null;
    activePointerId = null;
    setSliderTranslate(currentTranslate(), true);
  });
</script>
</body>
</html>
