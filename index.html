<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>240×240 空调制冷动态效果（刻度联动修正版）</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #111;
    display: grid;
    place-items: center;
    overflow: hidden;
    font-family: Arial, "Microsoft YaHei", sans-serif;
  }

  .screen {
    position: relative;
    width: 240px;
    height: 240px;
    border-radius: 50%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 38%, rgba(35,90,140,.18), transparent 40%),
      radial-gradient(circle at 50% 52%, #071019 0%, #02070d 62%, #000 100%);
    border: 3px solid #585f67;
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,.03),
      inset 0 0 24px rgba(0,170,255,.10),
      0 0 18px rgba(0,0,0,.8);
    user-select: none;
    touch-action: none;
  }

  .ticks {
    position: absolute;
    inset: 0;
    z-index: 7;
  }

  .tick {
    position: absolute;
    left: 117px;
    top: 19px;
    width: 7px;
    height: 15px;
    border-radius: 7px;
    transform-origin: 3.5px 101px;
    cursor: pointer;
    transition: top .12s, height .12s, opacity .12s, filter .12s, background .12s, box-shadow .12s;
    background: rgba(255,255,255,.10);
    opacity: .38;
    box-shadow: none;
  }

  .tick.selected {
    top: 19px;
    height: 15px;
    opacity: 1 !important;
    filter: brightness(1.30);
    outline: 1px solid rgba(255,255,255,.92);
    outline-offset: 1px;
  }

  .snow-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }

  .flake, .dot {
    position: absolute;
    top: -20px;
    color: rgba(86,192,255,.92);
    text-shadow: 0 0 6px rgba(0,170,255,.85);
    animation-iteration-count: infinite;
    pointer-events: none;
  }

  .flake {
    animation-name: fall, sway, twinkle;
    animation-timing-function: linear, ease-in-out, ease-in-out;
  }

  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(86,192,255,.92);
    box-shadow: 0 0 8px rgba(0,170,255,.85);
    animation-name: drift, twinkle;
    animation-timing-function: linear, ease-in-out;
  }

  .snow-main {
    position: absolute;
    top: 52px;
    left: 50%;
    transform: translateX(-50%);
    color: #33dfff;
    font-size: 37px;
    line-height: 1;
    text-shadow: 0 0 11px #00bfff;
    z-index: 4;
  }

  .temp-group {
    position: absolute;
    top: 92px;
    left: calc(50% - 13px);
    transform: translateX(-50%);
    width: 142px;
    height: 72px;
    z-index: 4;
    pointer-events: none;
  }

  .temp {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 71px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -4px;
    text-shadow: 0 0 10px rgba(95,195,255,.78);
    white-space: nowrap;
    transition: color .18s ease, text-shadow .18s ease;
  }

  .unit {
    position: absolute;
    top: 14px;
    left: calc(50% + 43px);
    font-size: 23px;
    color: #fff;
    text-shadow: 0 0 8px rgba(95,195,255,.78);
    white-space: nowrap;
  }

  .fan-area {
    position: absolute;
    top: 132px;
    left: 126px;
    width: 98px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 5px;
    z-index: 12;
    cursor: ew-resize;
    padding: 10px 8px;
    border-radius: 18px;
    overflow: visible;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .fan-area:active {
    background: rgba(70,190,255,.10);
  }
  .fan {
    width: 18px;
    height: 18px;
    display: grid;
    place-items: center;
    animation: spin 1.25s linear infinite;
    filter: drop-shadow(0 0 5px rgba(120,210,255,.78));
    flex: 0 0 auto;
    margin-left: 3px;
  }

  .fan-svg {
    width: 18px;
    height: 18px;
    overflow: visible;
  }

  .fan-blade {
    fill: rgba(255,255,255,.96);
    transition: fill .18s ease;
  }

  .fan-core {
    fill: rgba(255,255,255,1);
    transition: fill .18s ease;
  }


  .fan-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 22px;
    width: 38px;
    overflow: visible;
    flex: 0 0 auto;
  }

  .fan-bars b {
    display: block;
    width: 2px;
    border-radius: 2px;
    background: rgba(170, 210, 235, .46);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    transition: background .15s, box-shadow .15s, opacity .15s;
    opacity: .98;
    flex: 0 0 auto;
  }

  .fan-bars b:nth-child(1) { height: 8px; }
  .fan-bars b:nth-child(2) { height: 10px; }
  .fan-bars b:nth-child(3) { height: 12px; }
  .fan-bars b:nth-child(4) { height: 14px; }
  .fan-bars b:nth-child(5) { height: 16px; }
  .fan-bars b:nth-child(6) { height: 18px; }
  .fan-bars b:nth-child(7) { height: 20px; }

  .fan-bars b.on {
    background: rgba(255,255,255,.99);
    box-shadow:
      0 0 5px rgba(120,210,255,.95),
      inset 0 0 0 1px rgba(255,255,255,.12);
    opacity: 1;
  }

  .room {
    position: absolute;
    left: 50%;
    bottom: 31px;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    color: #fff;
    font-size: 20px;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(95,195,255,.75);
    z-index: 5;
  }

  .home-icon {
    width: 26px;
    height: 26px;
    flex: 0 0 auto;
    filter: drop-shadow(0 0 5px rgba(120,210,255,.75));
  }

  .hint {
    position: absolute;
    left: 50%;
    bottom: 8px;
    transform: translateX(-50%);
    color: rgba(165,215,240,.58);
    font-size: 8px;
    z-index: 5;
    white-space: nowrap;
  }

  .toast {
    position: absolute;
    left: 50%;
    bottom: 61px;
    transform: translateX(-50%);
    min-width: 68px;
    padding: 4px 9px;
    border-radius: 12px;
    background: rgba(0,20,35,.64);
    color: #e8f8ff;
    font-size: 11px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease;
    z-index: 12;
  }

  .toast.show { opacity: 1; }

  .glass {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background:
      linear-gradient(145deg, rgba(255,255,255,.07), transparent 26%),
      radial-gradient(circle at 64% 14%, rgba(255,255,255,.045), transparent 18%);
    pointer-events: none;
    z-index: 20;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fall {
    from { transform: translateY(-22px) rotate(0deg); }
    to   { transform: translateY(286px) rotate(360deg); }
  }

  @keyframes drift {
    from { transform: translateY(-15px); }
    to   { transform: translateY(275px); }
  }

  @keyframes sway {
    0%,100% { margin-left: -5px; }
    50%     { margin-left: 7px; }
  }

  @keyframes twinkle {
    0%,100% { opacity: .25; }
    25%,75% { opacity: .9; }
  }
</style>
</head>
<body>
<div class="screen" id="screen" aria-label="空调制冷动态效果图">
  <div class="ticks" id="ticks"></div>
  <div class="snow-layer" id="snowLayer"></div>

  <div class="snow-main">❄</div>

  <div class="temp-group">
    <div class="temp" id="tempValue">29</div>
    <div class="unit">°C</div>
  </div>

  <div class="fan-area" id="fanArea" title="点击切换风速">
    <div class="fan" id="fan" aria-hidden="true">
        <svg class="fan-svg" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="1.9" class="fan-core"/>
          <path d="M12 3.1c2.7 0 4.3 1.2 4.3 2.8 0 1.9-1.8 3.6-4.9 4.4-.6.2-1-.1-1.1-.7-.4-2.5-.2-4.5.6-5.6.3-.5.7-.9 1.1-.9z" class="fan-blade"/>
          <path d="M20.9 12c0 2.7-1.2 4.3-2.8 4.3-1.9 0-3.6-1.8-4.4-4.9-.2-.6.1-1 .7-1.1 2.5-.4 4.5-.2 5.6.6.5.3.9.7.9 1.1z" class="fan-blade"/>
          <path d="M12 20.9c-2.7 0-4.3-1.2-4.3-2.8 0-1.9 1.8-3.6 4.9-4.4.6-.2 1 .1 1.1.7.4 2.5.2 4.5-.6 5.6-.3.5-.7.9-1.1.9z" class="fan-blade"/>
          <path d="M3.1 12c0-2.7 1.2-4.3 2.8-4.3 1.9 0 3.6 1.8 4.4 4.9.2.6-.1 1-.7 1.1-2.5.4-4.5.2-5.6-.6-.5-.3-.9-.7-.9-1.1z" class="fan-blade"/>
        </svg>
      </div>
    <div class="fan-bars" id="fanBars"><b></b><b></b><b></b><b></b><b></b><b></b><b></b></div>
  </div>

  <div class="room">
    <svg class="home-icon" viewBox="0 0 32 32" aria-hidden="true">
      <path d="M5 15.5L16 6l11 9.5" fill="none" stroke="white" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8.5 14.5V26h15V14.5" fill="none" stroke="white" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M13.5 26v-8h5v8" fill="none" stroke="white" stroke-width="3"
            stroke-linejoin="round"/>
    </svg>
    <div>28.6°C</div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="glass"></div>
</div>

<script>
  const MIN_TEMP = 16;
  const MAX_TEMP = 32;
  const STEP_COUNT = MAX_TEMP - MIN_TEMP + 1; // 17格
  const ARC_HALF_ANGLE = 122;
  const START_ANGLE = -ARC_HALF_ANGLE;
  const END_ANGLE = ARC_HALF_ANGLE;

  const ticks = document.getElementById("ticks");
  const screen = document.getElementById("screen");
  const tempValue = document.getElementById("tempValue");
  const toast = document.getElementById("toast");

  let currentTemp = 29;
  let dragging = false;
  let toastTimer = null;
  const tickEls = [];

  function tickColor(index) {
    const t = index / (STEP_COUNT - 1);
    const hue = 188 - t * 128; // 蓝青 -> 黄
    return `hsl(${hue} 100% 58%)`;
  }

  for (let i = 0; i < STEP_COUNT; i++) {
    const el = document.createElement("div");
    el.className = "tick";
    const angle = START_ANGLE + (END_ANGLE - START_ANGLE) * i / (STEP_COUNT - 1);
    el.style.transform = `rotate(${angle}deg)`;
    el.dataset.temp = String(MIN_TEMP + i);
    el.dataset.activeColor = tickColor(i);
    el.title = `${MIN_TEMP + i}°C`;

    el.addEventListener("click", (event) => {
      event.stopPropagation();
      setTemperature(Number(el.dataset.temp), true);
    });

    ticks.appendChild(el);
    tickEls.push(el);
  }

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 850);
  }

  // 关键逻辑：
  // 16℃ -> 亮1格
  // 17℃ -> 亮2格
  // ...
  // 32℃ -> 亮17格
  function setTemperature(value, show = false) {
    currentTemp = Math.max(MIN_TEMP, Math.min(MAX_TEMP, Math.round(value)));
    tempValue.textContent = String(currentTemp);

    const litCount = currentTemp - MIN_TEMP + 1;
    const currentIndex = currentTemp - MIN_TEMP;
    const currentColor = tickColor(currentIndex);

    // 温度数字颜色跟随当前所选刻度颜色变化
    tempValue.style.color = currentColor;
    tempValue.style.textShadow = `0 0 10px ${currentColor}`;

    tickEls.forEach((el, index) => {
      const isLit = index < litCount;
      const isSelected = index === litCount - 1;
      const activeColor = el.dataset.activeColor;

      el.classList.toggle("selected", isSelected);

      if (isLit) {
        el.style.background = activeColor;
        el.style.boxShadow = `0 0 ${isSelected ? 10 : 7}px ${activeColor}`;
        el.style.opacity = isSelected ? "1" : ".92";
      } else {
        el.style.background = "rgba(255,255,255,.10)";
        el.style.boxShadow = "none";
        el.style.opacity = ".38";
      }
    });

    // 调温时不显示“设定 XX°C”提示，中央数字直接更新
  }

  function temperatureFromPointer(event) {
    const rect = screen.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;

    let angle = Math.atan2(dx, -dy) * 180 / Math.PI;
    angle = Math.max(START_ANGLE, Math.min(END_ANGLE, angle));

    const ratio = (angle - START_ANGLE) / (END_ANGLE - START_ANGLE);
    return MIN_TEMP + Math.round(ratio * (STEP_COUNT - 1));
  }

  function pointerInArcArea(event) {
    const rect = screen.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;
    const radius = Math.hypot(dx, dy);
    return radius >= 78 && radius <= 116;
  }

  screen.addEventListener("pointerdown", (event) => {
    if (!pointerInArcArea(event)) return;
    dragging = true;
    screen.setPointerCapture(event.pointerId);
    setTemperature(temperatureFromPointer(event), true);
  });

  screen.addEventListener("pointermove", (event) => {
    if (!dragging) return;
    setTemperature(temperatureFromPointer(event), false);
  });

  screen.addEventListener("pointerup", (event) => {
    if (!dragging) return;
    dragging = false;
    if (screen.hasPointerCapture(event.pointerId)) {
      screen.releasePointerCapture(event.pointerId);
    }
  });

  screen.addEventListener("pointercancel", () => {
    dragging = false;
  });

  // 动态雪花
  const layer = document.getElementById("snowLayer");
  const snowChars = ["❄","❅","❆"];

  for (let i = 0; i < 12; i++) {
    const f = document.createElement("span");
    f.className = "flake";
    f.textContent = snowChars[i % snowChars.length];

    const left = 16 + Math.random() * 205;
    const size = 8 + Math.random() * 8;
    const fall = 5 + Math.random() * 4.5;
    const sway = 2.5 + Math.random() * 2.2;
    const delay = -Math.random() * fall;

    f.style.left = `${left}px`;
    f.style.fontSize = `${size}px`;
    f.style.animationDuration = `${fall}s, ${sway}s, ${fall * .8}s`;
    f.style.animationDelay = `${delay}s, ${delay}s, ${delay}s`;
    layer.appendChild(f);
  }

  for (let i = 0; i < 18; i++) {
    const d = document.createElement("span");
    d.className = "dot";

    const left = 18 + Math.random() * 202;
    const fall = 4.8 + Math.random() * 4.5;
    const delay = -Math.random() * fall;
    const twinkle = 1.6 + Math.random() * 1.8;

    d.style.left = `${left}px`;
    d.style.animationDuration = `${fall}s, ${twinkle}s`;
    d.style.animationDelay = `${delay}s, ${delay}s`;
    layer.appendChild(d);
  }

  // 风速1~7档：支持点击竖线、鼠标拖动和触屏滑动
  const fan = document.getElementById("fan");
  const fanArea = document.getElementById("fanArea");
  const fanBars = [...document.querySelectorAll("#fanBars b")];
  const fanBlades = [...document.querySelectorAll(".fan-blade")];
  const fanCore = document.querySelector(".fan-core");

  let speedLevel = 4;
  let speedDragging = false;
  let activePointerId = null;

  const fanDurations = {
    1: 2.80,
    2: 2.20,
    3: 1.70,
    4: 1.25,
    5: 0.95,
    6: 0.70,
    7: 0.48
  };

  const fanColors = {
    1: "#ff453a",
    2: "#ff9f0a",
    3: "#ffd60a",
    4: "#30d158",
    5: "#64d2ff",
    6: "#0a84ff",
    7: "#bf5af2"
  };

  function updateFanSpeed(show = false) {
    const color = fanColors[speedLevel];

    fan.style.animationDuration = `${fanDurations[speedLevel]}s`;
    fan.style.filter = `drop-shadow(0 0 5px ${color})`;

    fanBlades.forEach((blade) => {
      blade.style.fill = color;
    });

    if (fanCore) {
      fanCore.style.fill = color;
    }

    fanBars.forEach((bar, index) => {
      const on = index < speedLevel;
      bar.classList.toggle("on", on);
      bar.style.background = on ? color : "rgba(170, 210, 235, .46)";
      bar.style.boxShadow = on
        ? `0 0 5px ${color}, inset 0 0 0 1px rgba(255,255,255,.12)`
        : "inset 0 0 0 1px rgba(255,255,255,.06)";
    });

    if (show) {
      showToast(`风速 ${speedLevel} 档`);
    }
  }

  function setSpeedFromClientX(clientX, show = true) {
    const rect = fanArea.getBoundingClientRect();

    // 将整个风扇控制区横向均分为7段
    const x = Math.max(0, Math.min(rect.width - 0.01, clientX - rect.left));
    const nextLevel = Math.floor((x / rect.width) * 7) + 1;

    if (nextLevel !== speedLevel) {
      speedLevel = nextLevel;
      updateFanSpeed(show);
    } else if (show) {
      updateFanSpeed(true);
    }
  }

  fanBars.forEach((bar, index) => {
    bar.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      event.stopPropagation();
      speedLevel = index + 1;
      updateFanSpeed(true);
    });
  });

  fanArea.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    event.stopPropagation();

    speedDragging = true;
    activePointerId = event.pointerId;

    try {
      fanArea.setPointerCapture(event.pointerId);
    } catch (_) {}

    setSpeedFromClientX(event.clientX, true);
  });

  document.addEventListener("pointermove", (event) => {
    if (!speedDragging) return;
    if (activePointerId !== null && event.pointerId !== activePointerId) return;

    event.preventDefault();
    setSpeedFromClientX(event.clientX, false);
  }, { passive: false });

  document.addEventListener("pointerup", (event) => {
    if (!speedDragging) return;
    if (activePointerId !== null && event.pointerId !== activePointerId) return;

    speedDragging = false;
    activePointerId = null;
    updateFanSpeed(true);
  });

  document.addEventListener("pointercancel", () => {
    speedDragging = false;
    activePointerId = null;
  });

  // 兼容部分浏览器的触摸事件
  fanArea.addEventListener("touchstart", (event) => {
    event.preventDefault();
    event.stopPropagation();

    speedDragging = true;
    const touch = event.touches[0];
    if (touch) setSpeedFromClientX(touch.clientX, true);
  }, { passive: false });

  document.addEventListener("touchmove", (event) => {
    if (!speedDragging) return;
    event.preventDefault();

    const touch = event.touches[0];
    if (touch) setSpeedFromClientX(touch.clientX, false);
  }, { passive: false });

  document.addEventListener("touchend", () => {
    if (!speedDragging) return;
    speedDragging = false;
    updateFanSpeed(true);
  });

  updateFanSpeed(false);
  setTemperature(currentTemp, false);
</script>
</body>
</html>
