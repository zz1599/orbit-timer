<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Timer Final</title>
<style>
*{box-sizing:border-box}
:root{
  --bg1:#091426;
  --bg2:#030712;
  --screen1:#0d192b;
  --screen2:#07111f;
  --line:rgba(148,163,184,.16);
  --text:#f8fafc;
  --sub:#94a3b8;
  --blue:#38bdf8;
  --blue2:#2563eb;
  --violet:#a78bfa;
  --green:#22c55e;
  --orange:#f59e0b;
}
html,body{
  margin:0;
  min-height:100%;
  font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:18px;
  background:
    radial-gradient(circle at 50% 8%,rgba(56,189,248,.14),transparent 30%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text);
}
.screen{
  width:240px;
  height:240px;
  position:relative;
  overflow:hidden;
  border-radius:26px;
  background:
    linear-gradient(160deg,rgba(255,255,255,.05),transparent 35%),
    linear-gradient(180deg,var(--screen1),var(--screen2));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:
    0 24px 60px rgba(2,8,23,.55),
    inset 0 1px 0 rgba(255,255,255,.06);
  user-select:none;
}
.screen::before{
  content:"";
  position:absolute;
  right:-50px;
  top:-50px;
  width:130px;
  height:130px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,.24),transparent 68%);
  pointer-events:none;
}
.screen::after{
  content:"";
  position:absolute;
  left:-48px;
  bottom:-52px;
  width:126px;
  height:126px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.10),transparent 70%);
  pointer-events:none;
}
.topbar{
  position:relative;
  z-index:2;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:9px 10px 0;
}
.brand{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:15px;
  font-weight:850;
}
.bell{
  width:25px;
  height:25px;
  border-radius:9px;
  display:grid;
  place-items:center;
  background:rgba(56,189,248,.13);
  border:1px solid rgba(56,189,248,.16);
  color:#7dd3fc;
  transform-origin:50% 12%;
}
.bell svg{width:15px;height:15px}
.ringing .bell{
  animation:ring .65s ease-in-out infinite;
}
@keyframes ring{
  0%,100%{transform:rotate(0)}
  15%{transform:rotate(18deg)}
  30%{transform:rotate(-16deg)}
  45%{transform:rotate(12deg)}
  60%{transform:rotate(-10deg)}
  75%{transform:rotate(7deg)}
  90%{transform:rotate(-4deg)}
}
.lang{
  min-width:40px;
  height:25px;
  border-radius:9px;
  border:1px solid rgba(56,189,248,.18);
  background:rgba(15,23,42,.45);
  color:#7dd3fc;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
}
.status{
  position:relative;
  z-index:2;
  height:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:10px;
  color:var(--sub);
}
.dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:#64748b;
}
.screen.enabled .dot{
  background:var(--green);
  box-shadow:0 0 10px rgba(34,197,94,.55);
}
.screen.finished .dot{
  background:var(--orange);
  box-shadow:0 0 10px rgba(245,158,11,.55);
}
.orbit-area{
  position:relative;
  z-index:2;
  height:143px;
  display:grid;
  place-items:center;
}
.orbit-stack{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.orbit-stack.left{left:7px}
.orbit-stack.right{right:7px}
.orbit-stack-label{
  font-size:9px;
  color:var(--sub);
  letter-spacing:.05em;
}
.orbit-control{
  width:32px;
  height:26px;
  border-radius:9px;
  border:1px solid var(--line);
  background:#17263d;
  color:white;
  font-size:15px;
  cursor:pointer;
}
.orbit-control:disabled{
  opacity:.28;
  cursor:not-allowed;
}
.orbit{
  width:118px;
  height:118px;
  position:relative;
  border-radius:50%;
  border:1px solid rgba(56,189,248,.16);
}
.orbit-ring{
  position:absolute;
  inset:9px;
  border-radius:50%;
  border:1px dashed rgba(125,211,252,.28);
  will-change:transform;
}
.orbit-ring.two{
  inset:21px;
}
.orbit-dot{
  position:absolute;
  top:-4px;
  left:50%;
  width:9px;
  height:9px;
  margin-left:-4.5px;
  border-radius:50%;
  background:var(--blue);
  box-shadow:0 0 14px rgba(56,189,248,.8);
}
.orbit-ring.two .orbit-dot{
  background:var(--violet);
  box-shadow:0 0 14px rgba(167,139,250,.8);
}
.orbit-center{
  position:absolute;
  inset:31px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.10),rgba(8,17,31,.95));
  border:1px solid rgba(255,255,255,.05);
  display:grid;
  place-items:center;
  text-align:center;
}
.orbit-time{
  font-size:22px;
  font-weight:900;
  letter-spacing:-.05em;
}
.orbit-sec{
  font-size:10px;
  color:#7dd3fc;
  margin-top:3px;
}
.orbit-percent{
  font-size:9px;
  color:var(--sub);
  margin-top:3px;
}
.footer-actions{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:2px 12px 8px;
}
.act{
  height:32px;
  border-radius:10px;
  font-size:12px;
  font-weight:800;
  cursor:pointer;
}
.start-btn{
  border:0;
  color:#fff;
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
}
.stop-btn{
  border:1px solid var(--line);
  color:#dbeafe;
  background:#17263d;
}
.act:disabled{
  opacity:.35;
  cursor:not-allowed;
}
.toast{
  position:absolute;
  left:50%;
  bottom:10px;
  transform:translate(-50%,10px);
  background:rgba(2,6,23,.94);
  border:1px solid var(--line);
  color:#e2e8f0;
  padding:6px 9px;
  border-radius:9px;
  font-size:10px;
  opacity:0;
  pointer-events:none;
  transition:.18s;
  white-space:nowrap;
  z-index:20;
}
.toast.show{
  opacity:1;
  transform:translate(-50%,0);
}
.finished-flash{
  animation:finishFlash 1s ease-in-out infinite;
}
@keyframes finishFlash{
  0%,100%{box-shadow:0 24px 60px rgba(2,8,23,.55),inset 0 1px 0 rgba(255,255,255,.06)}
  50%{box-shadow:0 0 0 4px rgba(245,158,11,.16),0 0 34px rgba(245,158,11,.26)}
}
</style>
</head>
<body>
  <div class="screen" id="screen">
    <div class="topbar">
      <div class="brand">
        <div class="bell" id="bell"></div>
        <span id="title">定时</span>
      </div>
      <button class="lang" id="langBtn">EN</button>
    </div>

    <div class="status">
      <span class="dot"></span>
      <span id="statusText">定时已关闭</span>
    </div>

    <div class="orbit-area">
      <div class="orbit-stack left">
        <div class="orbit-stack-label" id="hourLabel">时</div>
        <button class="orbit-control" id="hourPlus">＋</button>
        <button class="orbit-control" id="hourMinus">−</button>
      </div>

      <div class="orbit">
        <div class="orbit-ring" id="orbitRingOuter"><span class="orbit-dot"></span></div>
        <div class="orbit-ring two" id="orbitRingInner"><span class="orbit-dot"></span></div>
        <div class="orbit-center">
          <div>
            <div class="orbit-time"><span id="hourValue">00</span>:<span id="minuteValue">01</span></div>
            <div class="orbit-sec"><span id="secondValue">00</span>s</div>
            <div class="orbit-percent"><span id="percentValue">100</span>%</div>
          </div>
        </div>
      </div>

      <div class="orbit-stack right">
        <div class="orbit-stack-label" id="minuteLabel">分</div>
        <button class="orbit-control" id="minutePlus">＋</button>
        <button class="orbit-control" id="minuteMinus">−</button>
      </div>
    </div>

    <div class="footer-actions">
      <button class="act start-btn" id="startBtn">打开</button>
      <button class="act stop-btn" id="stopBtn" disabled>关闭</button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

<script>
(() => {
  const bellSvg = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 5.8a5 5 0 0 1 10 0v1.3c0 .5.17.98.47 1.38l1.06 1.41c.43.57.67 1.27.67 1.98V15a2 2 0 0 1-2 2H6.8a2 2 0 0 1-2-2v-2.13c0-.71.24-1.41.67-1.98l1.06-1.41c.3-.4.47-.88.47-1.38V5.8"/>
      <path d="M10 18a2 2 0 0 0 4 0"/>
    </svg>`;
  document.getElementById('bell').innerHTML = bellSvg;

  const state = {
    hour: 0,
    minute: 1,
    remaining: 60,
    enabled: false,
    finished: false,
    lang: 'zh',
    endAt: 0,
    interval: null,
    orbitRAF: null,
    orbitLastTs: 0,
    orbitAngleOuter: 0,
    orbitAngleInner: 0
  };

  const text = {
    zh: {
      title: '定时',
      hour: '时',
      minute: '分',
      open: '打开',
      close: '关闭',
      off: '定时已关闭',
      on: '倒计时中',
      done: '时间到啦',
      started: '倒计时已开始',
      stopped: '倒计时已关闭'
    },
    en: {
      title: 'Timer',
      hour: 'HOUR',
      minute: 'MIN',
      open: 'ON',
      close: 'OFF',
      off: 'Timer disabled',
      on: 'Counting down',
      done: 'Time is up',
      started: 'Countdown started',
      stopped: 'Timer disabled'
    }
  };

  const el = {
    screen: document.getElementById('screen'),
    title: document.getElementById('title'),
    langBtn: document.getElementById('langBtn'),
    statusText: document.getElementById('statusText'),
    hourLabel: document.getElementById('hourLabel'),
    minuteLabel: document.getElementById('minuteLabel'),
    hourValue: document.getElementById('hourValue'),
    minuteValue: document.getElementById('minuteValue'),
    secondValue: document.getElementById('secondValue'),
    percentValue: document.getElementById('percentValue'),
    hourPlus: document.getElementById('hourPlus'),
    hourMinus: document.getElementById('hourMinus'),
    minutePlus: document.getElementById('minutePlus'),
    minuteMinus: document.getElementById('minuteMinus'),
    startBtn: document.getElementById('startBtn'),
    stopBtn: document.getElementById('stopBtn'),
    toast: document.getElementById('toast'),
    orbitOuter: document.getElementById('orbitRingOuter'),
    orbitInner: document.getElementById('orbitRingInner')
  };

  let toastTimer = null;

  function t() {
    return text[state.lang];
  }

  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function totalSeconds() {
    return state.hour * 3600 + state.minute * 60;
  }

  function syncRemaining() {
    state.remaining = totalSeconds();
  }

  function splitTime(v) {
    v = Math.max(0, Math.floor(v));
    return {
      h: Math.floor(v / 3600),
      m: Math.floor((v % 3600) / 60),
      s: v % 60
    };
  }

  function ratio() {
    const total = totalSeconds() || 1;
    return Math.max(0, Math.min(1, state.remaining / total));
  }

  function showToast(msg) {
    clearTimeout(toastTimer);
    el.toast.textContent = msg;
    el.toast.classList.add('show');
    toastTimer = setTimeout(() => el.toast.classList.remove('show'), 1200);
  }

  function stopInterval() {
    if (state.interval) {
      clearInterval(state.interval);
      state.interval = null;
    }
  }

  function render() {
    const d = splitTime(state.remaining);
    el.hourValue.textContent = pad(d.h);
    el.minuteValue.textContent = pad(d.m);
    el.secondValue.textContent = pad(d.s);
    el.percentValue.textContent = String(Math.round(ratio() * 100));

    el.title.textContent = t().title;
    el.hourLabel.textContent = t().hour;
    el.minuteLabel.textContent = t().minute;
    el.langBtn.textContent = state.lang === 'zh' ? 'EN' : '中';
    el.startBtn.textContent = t().open;
    el.stopBtn.textContent = t().close;
    el.statusText.textContent = state.finished ? t().done : (state.enabled ? t().on : t().off);

    const lockEdit = state.enabled || state.finished;
    [el.hourPlus, el.hourMinus, el.minutePlus, el.minuteMinus].forEach(btn => {
      btn.disabled = lockEdit;
    });

    el.startBtn.disabled = state.enabled || state.finished;
    el.stopBtn.disabled = !(state.enabled || state.finished);

    el.screen.classList.toggle('enabled', state.enabled);
    el.screen.classList.toggle('finished', state.finished);
  }

  function updateCountdown() {
    if (!state.enabled) return;
    state.remaining = Math.max(0, Math.ceil((state.endAt - Date.now()) / 1000));

    if (state.remaining <= 0) {
      stopInterval();
      state.enabled = false;
      state.finished = true;
      el.screen.classList.add('ringing', 'finished-flash');
      render();
      showToast(t().done);
      return;
    }

    render();
  }

  function startCountdown() {
    const total = totalSeconds();
    if (total <= 0) return;

    state.finished = false;
    el.screen.classList.remove('ringing', 'finished-flash');
    state.remaining = total;
    state.enabled = true;
    state.endAt = Date.now() + total * 1000;
    stopInterval();
    state.interval = setInterval(updateCountdown, 250);
    render();
    showToast(t().started);
  }

  function stopCountdown() {
    stopInterval();
    state.enabled = false;
    state.finished = false;
    el.screen.classList.remove('ringing', 'finished-flash');
    syncRemaining();
    render();
    showToast(t().stopped);
  }

  function changeHour(delta) {
    if (state.enabled || state.finished) return;
    state.hour = (state.hour + delta + 24) % 24;
    syncRemaining();
    render();
  }

  function changeMinute(delta) {
    if (state.enabled || state.finished) return;
    state.minute = (state.minute + delta + 60) % 60;
    syncRemaining();
    render();
  }

  function updateOrbit(ts) {
    if (!state.orbitLastTs) state.orbitLastTs = ts;
    const dt = Math.min(0.05, (ts - state.orbitLastTs) / 1000);
    state.orbitLastTs = ts;

    const remainRatio = ratio();
    const progress = 1 - remainRatio;

    let outerSpeed = 9 + 2 * Math.sin(ts / 900);
    let innerSpeed = -(13 + 3 * Math.cos(ts / 760));

    if (state.enabled) {
      outerSpeed = 22 + progress * 150 + 10 * Math.sin(ts / 380);
      innerSpeed = -(32 + progress * 210 + 14 * Math.cos(ts / 310));
    } else if (state.finished) {
      outerSpeed = 220;
      innerSpeed = -280;
    }

    state.orbitAngleOuter = (state.orbitAngleOuter + outerSpeed * dt) % 360;
    state.orbitAngleInner = (state.orbitAngleInner + innerSpeed * dt) % 360;

    const outerScale = 1 + 0.006 * Math.sin(ts / 500);
    const innerScale = 1 + 0.008 * Math.cos(ts / 420);

    el.orbitOuter.style.transform = `rotate(${state.orbitAngleOuter}deg) scale(${outerScale})`;
    el.orbitInner.style.transform = `rotate(${state.orbitAngleInner}deg) scale(${innerScale})`;

    state.orbitRAF = requestAnimationFrame(updateOrbit);
  }

  el.hourPlus.addEventListener('click', () => changeHour(1));
  el.hourMinus.addEventListener('click', () => changeHour(-1));
  el.minutePlus.addEventListener('click', () => changeMinute(1));
  el.minuteMinus.addEventListener('click', () => changeMinute(-1));
  el.startBtn.addEventListener('click', startCountdown);
  el.stopBtn.addEventListener('click', stopCountdown);
  el.langBtn.addEventListener('click', () => {
    state.lang = state.lang === 'zh' ? 'en' : 'zh';
    render();
  });

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.enabled) {
      updateCountdown();
    }
  });

  render();
  state.orbitRAF = requestAnimationFrame(updateOrbit);
})();
</script>
</body>
</html>
