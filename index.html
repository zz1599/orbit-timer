<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>240×240 空调与智能控制八模式整圆滑动</title>
<style>
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(circle at 50% 42%, rgba(42, 96, 135, .22), transparent 32%),
      radial-gradient(circle at 50% 50%, #101821 0%, #070b10 55%, #020304 100%);
    display: grid;
    place-items: center;
    overflow: hidden;
    font-family: Arial, "Microsoft YaHei", sans-serif;
  }

  .viewport {
    width: 240px;
    height: 240px;
    position: relative;
    overflow: visible;
    touch-action: none;
    filter:
      drop-shadow(0 20px 34px rgba(0, 0, 0, .70))
      drop-shadow(0 0 18px rgba(80, 190, 255, .10));
  }

  .viewport::before {
    content: "";
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background:
      radial-gradient(circle, rgba(100, 220, 255, .12), transparent 62%);
    pointer-events: none;
    opacity: .75;
  }

  .slider {
    position: absolute;
    left: 0;
    top: 0;
    height: 240px;
    display: flex;
    gap: 26px;
    will-change: transform;
    transition: transform .34s cubic-bezier(.22,.78,.22,1);
  }

  .screen {
    --accent: #48d8ff;
    --accent-soft: rgba(72, 216, 255, .22);
    --accent-ring: rgba(72, 216, 255, .72);
    position: relative;
    width: 240px;
    height: 240px;
    flex: 0 0 240px;
    border-radius: 50%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 33%, rgba(255,255,255,.075), transparent 20%),
      radial-gradient(circle at 50% 52%, rgba(10, 22, 32, .98) 0%, #050a10 58%, #000 100%);
    border: 2px solid rgba(210, 225, 238, .38);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.08),
      inset 0 0 18px rgba(255,255,255,.035),
      inset 0 0 34px var(--accent-soft),
      0 0 0 1px rgba(255,255,255,.05),
      0 0 26px rgba(0,0,0,.80),
      0 0 28px var(--accent-soft);
    user-select: none;
    touch-action: none;
  }

  .screen::before {
    content: "";
    position: absolute;
    inset: 9px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow:
      inset 0 0 18px rgba(255,255,255,.035),
      0 0 18px var(--accent-soft);
    pointer-events: none;
    z-index: 1;
  }

  .screen::after {
    content: "";
    position: absolute;
    inset: 21px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 42%, var(--accent-soft), transparent 42%);
    opacity: .46;
    pointer-events: none;
    z-index: 1;
  }


  .ac-cool-screen {
    --accent: #22d8ff;
    --accent-soft: rgba(34, 216, 255, .22);
    --accent-ring: rgba(34, 216, 255, .76);
  }

  .ac-heat-screen {
    --accent: #ff8c1f;
    --accent-soft: rgba(255, 118, 24, .22);
    --accent-ring: rgba(255, 145, 28, .80);
  }

  .ac-fresh-screen {
    --accent: #20e5ff;
    --accent-soft: rgba(32, 229, 255, .20);
    --accent-ring: rgba(32, 229, 255, .74);
  }

  .ac-dry-screen {
    --accent: #28efaa;
    --accent-soft: rgba(40, 239, 170, .20);
    --accent-ring: rgba(40, 239, 170, .74);
  }


  .ac-cool-icon {
    filter:
      drop-shadow(0 0 6px rgba(34, 216, 255, .96))
      drop-shadow(0 0 16px rgba(0, 170, 255, .42));
  }

  .ac-snow-line {
    fill: none;
    stroke: #22d8ff;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .ac-heat-icon {
    filter:
      drop-shadow(0 0 6px rgba(255, 150, 38, .96))
      drop-shadow(0 0 16px rgba(255, 90, 20, .45));
  }

  .ac-sun-core {
    fill: #ff9a1f;
  }

  .ac-sun-ray {
    fill: none;
    stroke: #ffb84a;
    stroke-width: 3;
    stroke-linecap: round;
  }

  .ac-dry-icon {
    filter:
      drop-shadow(0 0 6px rgba(40, 239, 170, .94))
      drop-shadow(0 0 15px rgba(0, 220, 150, .42));
  }

  .ac-drop {
    fill: #28efaa;
  }

  .ac-drop-small {
    fill: #83ffcf;
    opacity: .92;
  }


  .fresh-screen {
    --accent: #1edcff;
    --accent-soft: rgba(30, 220, 255, .22);
    --accent-ring: rgba(30, 220, 255, .75);
  }

  .floor-screen {
    --accent: #ff9a1f;
    --accent-soft: rgba(255, 138, 28, .22);
    --accent-ring: rgba(255, 160, 36, .78);
  }

  .light-screen {
    --accent: #ffe76a;
    --accent-soft: rgba(255, 220, 70, .22);
    --accent-ring: rgba(255, 225, 95, .82);
  }

  .color-temp-screen {
    --accent: #ffcf58;
    --accent-soft: rgba(255, 205, 88, .17);
    --accent-ring: rgba(128, 220, 255, .72);
  }


  .screen {
    transition:
      transform .34s cubic-bezier(.22,.78,.22,1),
      opacity .34s cubic-bezier(.22,.78,.22,1),
      filter .34s cubic-bezier(.22,.78,.22,1);
  }

  .screen.is-current {
    transform: scale(1);
    opacity: 1;
    filter: none;
  }

  .screen.is-away {
    transform: scale(.965);
    opacity: .72;
    filter: saturate(.86) brightness(.86);
  }

  .ticks {
    position: absolute;
    inset: 0;
    z-index: 7;
  }

  .tick {
    position: absolute;
    left: 117px;
    top: 18px;
    width: 6px;
    height: 15px;
    border-radius: 7px;
    transform-origin: 3px 102px;
    cursor: pointer;
    transition: top .12s, height .12s, opacity .12s, filter .12s, background .12s, box-shadow .12s;
    background: rgba(255,255,255,.10);
    opacity: .34;
    box-shadow: none;
  }

  .tick.selected {
    top: 17px;
    height: 18px;
    opacity: 1 !important;
    filter: brightness(1.38);
    outline: 1px solid rgba(255,255,255,.92);
    outline-offset: 1px;
  }

  .mode-icon {
    position: absolute;
    top: 45px;
    left: 50%;
    transform: translateX(-50%);
    width: 47px;
    height: 47px;
    display: grid;
    place-items: center;
    z-index: 4;
    pointer-events: none;
  }

  .mode-icon-svg {
    width: 42px;
    height: 42px;
    overflow: visible;
    display: block;
  }

  .fresh-icon {
    filter:
      drop-shadow(0 0 6px rgba(30, 220, 255, 0.92))
      drop-shadow(0 0 14px rgba(0, 190, 255, 0.40));
  }

  .fresh-blade { fill: #1edcff; }

  .floor-icon {
    filter:
      drop-shadow(0 0 6px rgba(255, 150, 40, 0.95))
      drop-shadow(0 0 15px rgba(255, 95, 0, 0.48));
  }

  .floor-line {
    fill: none;
    stroke: #ff9a1f;
    stroke-width: 3.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .floor-base {
    fill: none;
    stroke: rgba(255, 210, 118, 0.92);
    stroke-width: 3;
    stroke-linecap: round;
  }

  .light-icon {
    filter:
      drop-shadow(0 0 6px rgba(255, 230, 92, 0.95))
      drop-shadow(0 0 15px rgba(255, 190, 30, 0.45));
  }

  .light-ray {
    stroke: #ffe76a;
    stroke-width: 3;
    stroke-linecap: round;
    fill: none;
  }

  .light-bulb { fill: #ffd84a; }
  .light-core { fill: rgba(255, 255, 218, 0.95); }


  .light-screen .unit {
    margin-left: 3px;
    margin-top: 0;
    font-size: 58px;
    line-height: 1;
  }

  .brightness-icon {
    filter:
      drop-shadow(0 0 6px rgba(255, 232, 90, 0.96))
      drop-shadow(0 0 18px rgba(255, 190, 40, 0.46));
  }

  .brightness-circle {
    fill: #ffd84a;
  }

  .brightness-ring {
    fill: none;
    stroke: #ffe76a;
    stroke-width: 3;
  }

  .brightness-ray {
    stroke: #ffe76a;
    stroke-width: 3;
    stroke-linecap: round;
  }

  .fresh-wind-icon {
    filter:
      drop-shadow(0 0 6px rgba(32, 225, 255, 0.92))
      drop-shadow(0 0 14px rgba(0, 190, 255, 0.42));
  }

  .fresh-wind-line {
    fill: none;
    stroke: #1edcff;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .fresh-wind-dot {
    fill: #1edcff;
  }



  .brightness-premium-bulb-icon {
    filter:
      drop-shadow(0 0 5px rgba(255, 220, 82, .86))
      drop-shadow(0 0 13px rgba(255, 168, 42, .30));
  }

  .premium-rays path {
    fill: none;
    stroke: url(#premiumBulbStroke);
    stroke-width: 2.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: .82;
  }

  .premium-bulb-outline {
    fill: none;
    stroke: url(#premiumBulbStroke);
    stroke-width: 3.1;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .premium-inner-glow {
    fill: none;
    stroke: rgba(255, 242, 166, .72);
    stroke-width: 2.0;
    stroke-linecap: round;
  }

  .premium-base path {
    fill: none;
    stroke: #ffd84a;
    stroke-width: 2.4;
    stroke-linecap: round;
    opacity: .9;
  }



  .ac-original-snow-main {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: grid;
    place-items: center;
    z-index: 4;
    pointer-events: none;
  }

  .ac-original-snowflake {
    top: 52px;
    color: #33dfff;
    font-size: 37px;
    line-height: 1;
    text-shadow: 0 0 11px #00bfff;
  }

  .ac-original-ventilation {
    top: 50px;
    width: 38px;
    height: 38px;
    filter:
      drop-shadow(0 0 6px rgba(30, 220, 255, 0.92))
      drop-shadow(0 0 14px rgba(0, 190, 255, 0.40));
  }

  .ac-original-icon-svg {
    width: 40px;
    height: 40px;
    overflow: visible;
  }

  .ac-original-mode-icon-blade {
    fill: #1edcff;
  }

  .ac-original-dry {
    top: 48px;
    width: 42px;
    height: 42px;
    filter:
      drop-shadow(0 0 6px rgba(35, 255, 185, 0.95))
      drop-shadow(0 0 14px rgba(0, 230, 155, 0.50));
  }

  .ac-original-dry-svg {
    width: 38px;
    height: 38px;
    overflow: visible;
  }

  .ac-original-mode-icon-drop {
    fill: #22f0a8;
  }


  .temp-group {
    position: absolute;
    top: 92px;
    left: 50%;
    transform: translateX(-50%);
    width: 166px;
    height: 72px;
    z-index: 4;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .temp-value {
    display: inline-flex;
    align-items: flex-start;
    justify-content: center;
    white-space: nowrap;
  }

  .temp {
    position: static;
    color: #ffffff;
    font-size: 58px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -2px;
    text-shadow:
      0 0 9px currentColor,
      0 0 18px rgba(255,255,255,.10);
    white-space: nowrap;
    transition: color .18s ease, text-shadow .18s ease;
  }

  .unit {
    position: static;
    margin-left: 3px;
    margin-top: 6px;
    font-size: 29px;
    font-weight: 300;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 10px rgba(95,195,255,.78);
    white-space: nowrap;
  }

  .light-screen .temp,
  .light-screen .unit {
    text-shadow: 0 0 10px rgba(255, 220, 80, .78);
  }


  .light-screen .temp.off-text {
    font-size: 48px;
    font-weight: 600;
    letter-spacing: 0;
  }

  .color-temp-screen .temp-group {
    top: 94px;
  }

  .color-temp-screen .temp {
    font-size: 58px;
  }

  .color-temp-screen .temp-side {
    margin-left: 3px;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
  }

  .color-temp-screen .unit {
    margin: 0;
    font-size: 29px;
    line-height: .9;
  }

  .color-temp-screen .temp-tail {
    margin-top: 2px;
    font-size: 23px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -1px;
    color: #fff;
    text-shadow: 0 0 9px rgba(255, 220, 80, .78);
    white-space: nowrap;
    transition: color .18s ease, text-shadow .18s ease;
  }

  .fan-area {
    position: absolute;
    top: 132px;
    left: 126px;
    width: 98px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 5px;
    z-index: 12;
    cursor: ew-resize;
    padding: 10px 8px;
    border-radius: 18px;
    overflow: visible;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .fan-area:active {
    background: rgba(70,190,255,.10);
  }

  .fan {
    width: 18px;
    height: 18px;
    display: grid;
    place-items: center;
    animation: spin 1.25s linear infinite;
    filter: drop-shadow(0 0 5px rgba(120,210,255,.78));
    flex: 0 0 auto;
    margin-left: 3px;
  }

  .fan-svg {
    width: 18px;
    height: 18px;
    overflow: visible;
  }

  .fan-blade {
    fill: rgba(255,255,255,.96);
    transition: fill .18s ease;
  }

  .fan-core {
    fill: rgba(255,255,255,1);
    transition: fill .18s ease;
  }

  .fan-bars {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 22px;
    width: 38px;
    overflow: visible;
    flex: 0 0 auto;
  }

  .fan-bars b {
    display: block;
    width: 2px;
    border-radius: 2px;
    background: rgba(170, 210, 235, .46);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    transition: background .15s, box-shadow .15s, opacity .15s;
    opacity: .98;
    flex: 0 0 auto;
  }

  .fan-bars b:nth-child(1) { height: 8px; }
  .fan-bars b:nth-child(2) { height: 10px; }
  .fan-bars b:nth-child(3) { height: 12px; }
  .fan-bars b:nth-child(4) { height: 14px; }
  .fan-bars b:nth-child(5) { height: 16px; }
  .fan-bars b:nth-child(6) { height: 18px; }
  .fan-bars b:nth-child(7) { height: 20px; }
  .fan-bars b.on { opacity: 1; }

  .room {
    position: absolute;
    left: 50%;
    bottom: 31px;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #fff;
    font-size: 20px;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(95,195,255,.75);
    z-index: 5;
  }

  .home-icon {
    width: 26px;
    height: 26px;
    flex: 0 0 auto;
    filter: drop-shadow(0 0 5px rgba(120,210,255,.75));
  }

  .bottom-label {
    position: relative;
    font-size: 21px;
    letter-spacing: .14em;
    color: #fff7bd;
    text-shadow:
      0 0 8px rgba(255, 220, 80, .88),
      0 0 14px rgba(255, 190, 30, .42);
    white-space: nowrap;
  }

  .bottom-label::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -8px;
    width: 24px;
    height: 2px;
    border-radius: 4px;
    transform: translateX(-50%);
    background: currentColor;
    box-shadow: 0 0 8px currentColor;
    opacity: .72;
  }

  .toast {
    position: absolute;
    left: 50%;
    bottom: 61px;
    transform: translateX(-50%);
    min-width: 68px;
    padding: 4px 9px;
    border-radius: 12px;
    background: rgba(0,20,35,.64);
    color: #e8f8ff;
    font-size: 11px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease;
    z-index: 12;
  }

  .toast.show { opacity: 1; }


  .light-screen .bottom-label::after,
  .color-temp-screen .bottom-label::after {
    display: none;
  }

  .glass {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background:
      linear-gradient(145deg, rgba(255,255,255,.12), transparent 25%),
      radial-gradient(circle at 63% 13%, rgba(255,255,255,.07), transparent 18%),
      linear-gradient(215deg, transparent 0%, rgba(255,255,255,.035) 52%, transparent 72%);
    pointer-events: none;
    z-index: 20;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="viewport" id="viewport" aria-label="空调与智能控制八模式左右滑动切换">
  <div class="slider" id="slider"></div>
</div>

<script>
  const STEP_COUNT = 17;
  const ARC_HALF_ANGLE = 122;
  const START_ANGLE = -ARC_HALF_ANGLE;
  const END_ANGLE = ARC_HALF_ANGLE;
  const SLIDE_GAP = 26;
  const SLIDE_STEP = 240 + SLIDE_GAP;

  const slider = document.getElementById("slider");

  const COLOR_TEMP_VALUES = [
    2700, 3000, 3200, 3500, 3800, 4000, 4300, 4500, 4800,
    5000, 5300, 5500, 5800, 6000, 6200, 6400, 6500
  ];

  const fanDurations = {
    1: 2.80,
    2: 2.20,
    3: 1.70,
    4: 1.25,
    5: 0.95,
    6: 0.70,
    7: 0.48
  };

  const modes = [

    {
      key: "ac-cool",
      name: "制冷",
      className: "ac-cool-screen",
      min: 16,
      max: 32,
      initial: 29,
      unit: "°C",
      hasFan: true,
      fanBarColors: ["#0a84ff", "#34a0ff", "#22b8ff", "#5ad0ff", "#3fd9c6", "#6be6b8", "#30d158"],
      iconHTML: `
        <div class="ac-original-snow-main ac-original-snowflake">❄</div>
      `,
      bottomHTML: homeRoomHTML(),
      tickColor(index) {
        const t = index / (STEP_COUNT - 1);
        const hue = 188 - t * 128;
        return `hsl(${hue} 100% 58%)`;
      },
      valueFromIndex(index) {
        return Math.round(this.min + (this.max - this.min) * index / (STEP_COUNT - 1));
      }
    },
    {
      key: "ac-heat",
      name: "制热",
      className: "ac-heat-screen",
      min: 16,
      max: 32,
      initial: 29,
      unit: "°C",
      hasFan: true,
      fanBarColors: ["#ffd95a", "#ffcf3a", "#ffbe2e", "#ffb01f", "#ffa21a", "#ff9214", "#ff7a0f"],
      iconHTML: `
        <div class="mode-icon ac-heat-icon">
          <svg class="mode-icon-svg" viewBox="0 0 48 48" aria-hidden="true">
            <circle class="ac-sun-core" cx="24" cy="24" r="8"/>
            <path class="ac-sun-ray" d="M24 5.5 V10"/>
            <path class="ac-sun-ray" d="M24 38 V42.5"/>
            <path class="ac-sun-ray" d="M5.5 24 H10"/>
            <path class="ac-sun-ray" d="M38 24 H42.5"/>
            <path class="ac-sun-ray" d="M10.8 10.8 L14.0 14.0"/>
            <path class="ac-sun-ray" d="M34.0 34.0 L37.2 37.2"/>
            <path class="ac-sun-ray" d="M37.2 10.8 L34.0 14.0"/>
            <path class="ac-sun-ray" d="M14.0 34.0 L10.8 37.2"/>
          </svg>
        </div>
      `,
      bottomHTML: homeRoomHTML(),
      tickColor(index) {
        const t = index / (STEP_COUNT - 1);
        const hue = 50 - t * 22;
        const lightness = 60 - t * 6;
        return `hsl(${hue} 100% ${lightness}%)`;
      },
      valueFromIndex(index) {
        return Math.round(this.min + (this.max - this.min) * index / (STEP_COUNT - 1));
      }
    },
    {
      key: "ac-fresh",
      name: "通风",
      className: "ac-fresh-screen",
      min: 16,
      max: 32,
      initial: 29,
      unit: "°C",
      hasFan: true,
      fanBarColors: ["#59d7ff", "#7fe4ff", "#4ed7ea", "#73e3ea", "#48d8c2", "#70e4c9", "#6fdf8f"],
      iconHTML: `
        <div class="ac-original-snow-main ac-original-ventilation">
          <svg class="ac-original-icon-svg" viewBox="0 0 48 48" aria-hidden="true">
            <g transform="translate(24 24)">
              <path class="ac-original-mode-icon-blade" d="M1.2 -1.1
                C 2.8 -7.8, 7.0 -12.8, 11.5 -14.0
                C 14.4 -14.8, 17.1 -13.6, 18.5 -11.0
                C 20.0 -8.2, 19.4 -4.8, 17.0 -2.0
                C 14.0 1.4, 9.0 3.5, 4.8 3.0
                C 2.0 2.7, 0.1 1.2, -0.2 -0.8
                C -0.4 -2.0, 0.0 -2.6, 1.2 -1.1 Z"/>
              <path class="ac-original-mode-icon-blade" d="M1.2 -1.1
                C 2.8 -7.8, 7.0 -12.8, 11.5 -14.0
                C 14.4 -14.8, 17.1 -13.6, 18.5 -11.0
                C 20.0 -8.2, 19.4 -4.8, 17.0 -2.0
                C 14.0 1.4, 9.0 3.5, 4.8 3.0

  function valueDisplayHTML(mode, state) {

  function createScreen(mode, index) {
    const state = states[index];
    const screen = document.createElement("div");
    screen.className = `screen ${mode.className}`;
    screen.dataset.modeIndex = String(index);
    screen.setAttribute("aria-label", `${mode.name}模式效果图`);

    screen.innerHTML = `
      <div class="ticks"></div>
      ${mode.iconHTML}
      ${valueDisplayHTML(mode, state)}
      ${mode.hasFan ? fanAreaHTML() : ""}
      ${mode.bottomHTML}
      <div class="toast"></div>
      <div class="glass"></div>
    `;

    const ticks = screen.querySelector(".ticks");
    for (let i = 0; i < STEP_COUNT; i++) {
      const el = document.createElement("div");
      el.className = "tick";
      const angle = START_ANGLE + (END_ANGLE - START_ANGLE) * i / (STEP_COUNT - 1);
      el.style.transform = `rotate(${angle}deg)`;
      el.dataset.index = String(i);
      el.dataset.value = String(valueFromIndex(mode, i));
      el.title = `${el.dataset.value}${mode.unit}`;

      el.addEventListener("click", (event) => {
        event.stopPropagation();
        setValue(screen, Number(el.dataset.value));
      });

      ticks.appendChild(el);
    }

    return screen;
  }

  function valueFromIndex(mode, index) {
    return mode.valueFromIndex(index);
  }

  function indexFromValue(mode, value) {
    let nearest = 0;
    let bestDiff = Infinity;

    for (let i = 0; i < STEP_COUNT; i++) {
      const item = valueFromIndex(mode, i);
      const diff = Math.abs(item - value);
      if (diff < bestDiff) {
        bestDiff = diff;
        nearest = i;
      }
    }

    return nearest;
  }

  function setValue(screen, value) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];
    const state = states[index];

    const currentIndex = indexFromValue(mode, value);
    state.value = valueFromIndex(mode, currentIndex);

    const currentColor = mode.tickColor(currentIndex);
    const temp = screen.querySelector(".temp");
    const tail = screen.querySelector(".temp-tail");

    if (mode.key === "color-temp") {
      const text = String(state.value);
      temp.textContent = text.slice(0, 2);
      if (tail) tail.textContent = text.slice(2);
    } else if (mode.key === "light" && state.value === 0) {
      temp.textContent = "OFF";
      temp.classList.add("off-text");
      const unit = screen.querySelector(".unit");
      if (unit) unit.style.display = "none";
    } else {
      temp.textContent = String(state.value);
      temp.classList.remove("off-text");
      const unit = screen.querySelector(".unit");
      if (unit) unit.style.display = "";
    }

    temp.style.color = currentColor;
    temp.style.textShadow = `0 0 10px ${currentColor}`;

    if (tail) {
      tail.style.color = currentColor;
      tail.style.textShadow = `0 0 9px ${currentColor}`;
    }

    const litCount = currentIndex + 1;
    [...screen.querySelectorAll(".tick")].forEach((el, tickIndex) => {
      const isLit = tickIndex < litCount;
      const isSelected = tickIndex === litCount - 1;
      const activeColor = mode.tickColor(tickIndex);

      el.classList.toggle("selected", isSelected);

      if (isLit) {
        el.style.background = activeColor;
        el.style.boxShadow = `0 0 ${isSelected ? 10 : 7}px ${activeColor}`;
        el.style.opacity = isSelected ? "1" : ".92";
      } else {
        el.style.background = "rgba(255,255,255,.10)";
        el.style.boxShadow = "none";
        el.style.opacity = ".38";
      }
    });
  }

  function updateFanSpeed(screen, show = false) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];
    if (!mode.hasFan) return;

    const state = states[index];
    const barColors = mode.fanBarColors;
    const color = barColors[state.speed - 1];

    const fan = screen.querySelector(".fan");
    if (fan) {
      fan.style.animationDuration = `${fanDurations[state.speed]}s`;
      fan.style.filter = `drop-shadow(0 0 5px ${color})`;
    }

    screen.querySelectorAll(".fan-blade").forEach((blade) => {
      blade.style.fill = color;
    });

    const fanCore = screen.querySelector(".fan-core");
    if (fanCore) fanCore.style.fill = color;

    [...screen.querySelectorAll(".fan-bars b")].forEach((bar, barIndex) => {
      const on = barIndex < state.speed;
      const barColor = barColors[barIndex] || color;
      bar.classList.toggle("on", on);
      bar.style.background = on ? barColor : "rgba(170, 210, 235, .46)";
      bar.style.boxShadow = on
        ? `0 0 5px ${barColor}, inset 0 0 0 1px rgba(255,255,255,.12)`
        : "inset 0 0 0 1px rgba(255,255,255,.06)";
    });
  }

  function valueFromPointer(screen, event) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];

    const rect = screen.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;

    let angle = Math.atan2(dx, -dy) * 180 / Math.PI;
    angle = Math.max(START_ANGLE, Math.min(END_ANGLE, angle));

    const ratio = (angle - START_ANGLE) / (END_ANGLE - START_ANGLE);
    const valueIndex = Math.round(ratio * (STEP_COUNT - 1));
    return valueFromIndex(mode, valueIndex);
  }

  function pointerInArcArea(screen, event) {
    const rect = screen.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = event.clientX - cx;
    const dy = event.clientY - cy;
    const radius = Math.hypot(dx, dy);
    return radius >= 78 && radius <= 116;
  }

  function setSpeedFromClientX(screen, clientX, show = true) {
    const index = Number(screen.dataset.modeIndex);
    const mode = modes[index];
    if (!mode.hasFan) return;

    const area = screen.querySelector(".fan-area");
    const rect = area.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width - 0.01, clientX - rect.left));
    const nextLevel = Math.floor((x / rect.width) * 7) + 1;
    const state = states[index];

    if (nextLevel !== state.speed) {
      state.speed = nextLevel;
      updateFanSpeed(screen, show);
    } else if (show) {
      updateFanSpeed(screen, true);
    }
  }

  function currentTranslate() {
    return -modeIndex * SLIDE_STEP;
  }

  function setSliderTranslate(x, animate = true) {
    slider.style.transition = animate ? "transform .34s cubic-bezier(.22,.78,.22,1)" : "none";
    slider.style.transform = `translateX(${x}px)`;
  }

  function switchTo(index) {
    modeIndex = ((index % modes.length) + modes.length) % modes.length;
    setSliderTranslate(currentTranslate(), true);
    updateActiveScreens();
  }


  function updateActiveScreens() {
    [...document.querySelectorAll(".screen")].forEach((screen, index) => {
      screen.classList.toggle("is-current", index === modeIndex);
      screen.classList.toggle("is-away", index !== modeIndex);
    });
  }

  modes.forEach((mode, index) => {
    slider.appendChild(createScreen(mode, index));
  });

  [...document.querySelectorAll(".screen")].forEach((screen) => {
    setValue(screen, states[Number(screen.dataset.modeIndex)].value);
    updateFanSpeed(screen, false);
  });

  setSliderTranslate(0, false);
  updateActiveScreens();

  slider.addEventListener("pointerdown", (event) => {
    const screen = event.target.closest(".screen");
    if (!screen) return;

    activeScreen = screen;
    activePointerId = event.pointerId;
    startX = event.clientX;
    startY = event.clientY;
    startTranslate = currentTranslate();

    if (event.target.closest(".fan-area")) {
      event.preventDefault();
      isSpeedDragging = true;
      setSpeedFromClientX(screen, event.clientX, true);
      try { slider.setPointerCapture(event.pointerId); } catch (_) {}
      return;
    }

    if (pointerInArcArea(screen, event)) {
      event.preventDefault();
      isValueDragging = true;
      setValue(screen, valueFromPointer(screen, event));
      try { slider.setPointerCapture(event.pointerId); } catch (_) {}
      return;
    }

    event.preventDefault();
    isSwiping = true;
    setSliderTranslate(startTranslate, false);
    try { slider.setPointerCapture(event.pointerId); } catch (_) {}
  });

  slider.addEventListener("pointermove", (event) => {
    if (activePointerId !== event.pointerId || !activeScreen) return;

    if (isSpeedDragging) {
      event.preventDefault();
      setSpeedFromClientX(activeScreen, event.clientX, false);
      return;
    }

    if (isValueDragging) {
      event.preventDefault();
      setValue(activeScreen, valueFromPointer(activeScreen, event));
      return;
    }

    if (isSwiping) {
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;
      if (Math.abs(dx) > Math.abs(dy)) {
        event.preventDefault();
        setSliderTranslate(startTranslate + dx, false);
      }
    }
  }, { passive: false });

  slider.addEventListener("pointerup", (event) => {
    if (activePointerId !== event.pointerId) return;

    if (isSpeedDragging) {
      updateFanSpeed(activeScreen, true);
    }

    if (isSwiping) {
      const dx = event.clientX - startX;
      const dy = event.clientY - startY;

      if (Math.abs(dx) >= 42 && Math.abs(dx) > Math.abs(dy) * 1.2) {
        if (dx < 0) {
          switchTo(modeIndex + 1);
        } else {
          switchTo(modeIndex - 1);
        }
      } else {
        setSliderTranslate(currentTranslate(), true);
      }
    }

    isSwiping = false;
    isValueDragging = false;
    isSpeedDragging = false;
    activeScreen = null;
    activePointerId = null;
  });

  slider.addEventListener("pointercancel", () => {
    isSwiping = false;
    isValueDragging = false;
    isSpeedDragging = false;
    activeScreen = null;
    activePointerId = null;
    setSliderTranslate(currentTranslate(), true);
  });
</script>
</body>
</html>
