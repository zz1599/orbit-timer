<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空调定时圆形版</title>
<style>
*{box-sizing:border-box}
:root{
  --bg1:#07111f;
  --bg2:#030712;
  --screenA:#0c1728;
  --screenB:#08111f;
  --panel:#0f1b2f;
  --panel2:#152238;
  --line:rgba(148,163,184,.16);
  --text:#f8fafc;
  --sub:#94a3b8;
  --accent:#38bdf8;
  --accent2:#2563eb;
  --success:#22c55e;
  --warn:#f59e0b;
  --modeIdle:#142033;
}
html,body{
  margin:0;
  min-height:100%;
  font-family:Inter,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:18px;
  color:var(--text);
  background:
    radial-gradient(circle at 50% 8%,rgba(56,189,248,.12),transparent 28%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}
.screen{
  width:240px;
  height:240px;
  position:relative;
  overflow:hidden;
  border-radius:50%;
  background:
    linear-gradient(160deg,rgba(255,255,255,.06),transparent 36%),
    linear-gradient(180deg,var(--screenA),var(--screenB));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:
    0 22px 55px rgba(2,8,23,.56),
    inset 0 1px 0 rgba(255,255,255,.06);
}
.screen::before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.04);
  box-shadow:inset 0 0 30px rgba(56,189,248,.04);
  pointer-events:none;
}
.screen::after{
  content:"";
  position:absolute;
  left:18px; right:18px; top:18px; bottom:18px;
  border-radius:50%;
  border:1px solid rgba(56,189,248,.06);
  pointer-events:none;
}

.topbar{
  position:absolute;
  z-index:2;
  left:0;
  right:0;
  top:24px;
  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
}
.title-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-width:max-content;
}
.icon-box{
  width:22px;
  height:22px;
  border-radius:9px;
  display:grid;
  place-items:center;
  position:relative;
  color:var(--accent);
  background:linear-gradient(145deg,rgba(56,189,248,.16),rgba(37,99,235,.18));
  border:1px solid rgba(56,189,248,.20);
  transform-origin:50% 12%;
}
.icon-box svg{width:13px;height:13px;display:block}
.ring-line{
  position:absolute;
  width:9px;
  height:9px;
  border:2px solid transparent;
  border-top-color:var(--warn);
  border-radius:50%;
  opacity:0;
}
.ring-left{left:-4px;top:5px;transform:rotate(-40deg)}
.ring-right{right:-4px;top:5px;transform:rotate(40deg)}
.title{
  font-size:18px;
  font-weight:900;
  letter-spacing:.02em;
}


.status-row{
  position:absolute;
  z-index:2;
  left:0;
  right:0;
  top:58px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0;
}
.status-pill{
  min-width:86px;
  height:18px;
  padding:0 8px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  border-radius:999px;
  background:rgba(0,0,0,.08);
  border:1px solid var(--line);
  color:var(--sub);
  font-size:8px;
}
.status-dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:#64748b;
  box-shadow:0 0 0 3px rgba(100,116,139,.10);
}
.screen.enabled .status-pill{
  color:#a7f3d0;
  background:rgba(34,197,94,.10);
  border-color:rgba(34,197,94,.18);
}
.screen.enabled .status-dot{
  background:var(--success);
  box-shadow:0 0 0 3px rgba(34,197,94,.12),0 0 12px rgba(34,197,94,.42);
}
.screen.finished .status-pill{
  color:#fde68a;
  background:rgba(245,158,11,.11);
  border-color:rgba(245,158,11,.18);
}
.screen.finished .status-dot{
  background:var(--warn);
  box-shadow:0 0 0 3px rgba(245,158,11,.13),0 0 12px rgba(245,158,11,.42);
}

.mode-row{
  position:absolute;
  z-index:2;
  left:43px;
  right:43px;
  top:86px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
  padding:0;
  margin:0;
}
.mode-btn{
  height:24px;
  border-radius:11px;
  border:1px solid var(--line);
  background:var(--modeIdle);
  color:#86a1c3;
  font-size:10px;
  font-weight:800;
  cursor:pointer;
  padding:0;
}
.mode-btn.selected{
  color:#fff;
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
  border-color:rgba(56,189,248,.28);
  box-shadow:
    0 6px 14px rgba(37,99,235,.20),
    inset 0 1px 0 rgba(255,255,255,.16);
}
.mode-btn:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.time-panel{
  position:absolute;
  z-index:2;
  left:37px;
  right:37px;
  top:112px;
  height:72px;
  margin:0;
  border-radius:15px;
  border:1px solid var(--line);
  background:
    linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01)),
    var(--panel);
  display:grid;
  grid-template-columns:1fr 16px 1fr;
  align-items:center;
  padding:5px;
}
.time-group{
  height:54px;
  display:grid;
  grid-template-rows:14px 1fr;
  justify-items:center;
  align-items:center;
}
.unit{
  font-size:8px;
  color:var(--sub);
  letter-spacing:.08em;
}
.value{
  min-width:36px;
  text-align:center;
  font-size:24px;
  line-height:1;
  font-weight:800;
  letter-spacing:-.04em;
}
.middle{
  height:54px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
}
.colon{
  font-size:20px;
  color:rgba(148,163,184,.78);
  font-weight:800;
  line-height:1;
  transform:translateY(8px);
}










.toast.show{
  opacity:1;
  transform:translate(-50%,0);
}

.ringing .icon-box{animation:ringShake .65s ease-in-out infinite}
.ringing .ring-line{
  opacity:1;
  animation:ringWave .65s ease-in-out infinite;
}
@keyframes ringShake{
  0%,100%{transform:rotate(0deg)}
  10%{transform:rotate(18deg)}
  20%{transform:rotate(-16deg)}
  30%{transform:rotate(14deg)}
  40%{transform:rotate(-12deg)}
  50%{transform:rotate(10deg)}
  60%{transform:rotate(-8deg)}
  70%{transform:rotate(6deg)}
  80%{transform:rotate(-4deg)}
  90%{transform:rotate(2deg)}
}
@keyframes ringWave{
  0%{transform:scale(.72);opacity:.15}
  50%{transform:scale(1.12);opacity:1}
  100%{transform:scale(1.28);opacity:0}
}

/* 适中留白布局：不拥挤，同时避免圆形边缘裁切 */
.topbar{
  position:absolute !important;
  left:0 !important;
  right:0 !important;
  top:30px !important;
  height:24px !important;
  padding:0 !important;
  margin:0 !important;
  transform:none !important;
  justify-content:center !important;
}

.status-row{
  position:absolute !important;
  left:0 !important;
  right:0 !important;
  top:67px !important;
  height:18px !important;
  margin:0 !important;
  transform:none !important;
}

.mode-row{
  position:absolute !important;
  left:43px !important;
  right:43px !important;
  top:96px !important;
  padding:0 !important;
  margin:0 !important;
  transform:none !important;
}

.time-panel{
  position:absolute !important;
  left:38px !important;
  right:38px !important;
  top:128px !important;
  height:72px !important;
  margin:0 !important;
  transform:none !important;
}

</style>
</head>
<body>
<div class="screen" id="screen">
  <div class="topbar">
    <div class="title-wrap">
      <div class="icon-box">
        <span class="ring-line ring-left"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 5.8a5 5 0 0 1 10 0v1.3c0 .5.17.98.47 1.38l1.06 1.41c.43.57.67 1.27.67 1.98V15a2 2 0 0 1-2 2H6.8a2 2 0 0 1-2-2v-2.13c0-.71.24-1.41.67-1.98l1.06-1.41c.3-.4.47-.88.47-1.38V5.8"/>
          <path d="M10 18a2 2 0 0 0 4 0"/>
        </svg>
        <span class="ring-line ring-right"></span>
      </div>
      <div class="title" id="title">定时</div>
    </div>
  </div>

  <div class="status-row">
    <div class="status-pill">
      <span class="status-dot"></span>
      <span id="statusText">定时未启动</span>
    </div>
  </div>

  <div class="mode-row">
    <button class="mode-btn selected" id="modeOnBtn">定时开</button>
    <button class="mode-btn" id="modeOffBtn">定时关</button>
  </div>

  <div class="time-panel">
    <div class="time-group">
      <div class="unit" id="hourLabel">时</div>
      <div class="value" id="hourValue">00</div>
    </div>

    <div class="middle">
      <div class="colon">:</div>
    </div>

    <div class="time-group">
      <div class="unit" id="minuteLabel">分</div>
      <div class="value" id="minuteValue">01</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
(() => {
  const state = {
    configuredSeconds: 60,
    remainingSeconds: 60,
    enabled: false,
    finished: false,
    lang: 'zh',
    mode: 'on',   // on = 定时开, off = 定时关
    endAt: 0,
    intervalId: null
  };

  const words = {
    zh: {
      title:'定时',
      hour:'时',
      minute:'分',
      modeOn:'定时开',
      modeOff:'定时关',
      idle:'定时未启动',
      counting:'倒计时中',
      doneOn:'空调已开启',
      doneOff:'空调已关闭',
      willOn:'空调将在 {time} 后开启',
      willOff:'空调将在 {time} 后关闭',
      startedOn:'定时开已启动',
      startedOff:'定时关已启动',
      canceled:'定时已取消'
    },
    en: {
      title:'Timer',
      hour:'HOUR',
      minute:'MIN',
      modeOn:'Timer ON',
      modeOff:'Timer OFF',
      idle:'Timer idle',
      counting:'Counting down',
      doneOn:'AC turned on',
      doneOff:'AC turned off',
      willOn:'AC will turn on in {time}',
      willOff:'AC will turn off in {time}',
      startedOn:'Timer ON started',
      startedOff:'Timer OFF started',
      canceled:'Timer canceled'
    }
  };

  const el = {
    screen:document.getElementById('screen'),
    title:document.getElementById('title'),
    statusText:document.getElementById('statusText'),
    modeOnBtn:document.getElementById('modeOnBtn'),
    modeOffBtn:document.getElementById('modeOffBtn'),
    hourLabel:document.getElementById('hourLabel'),
    minuteLabel:document.getElementById('minuteLabel'),
    hourValue:document.getElementById('hourValue'),
    minuteValue:document.getElementById('minuteValue'),
    toast:document.getElementById('toast')
  };

  let toastTimer = null;

  function t(){ return words[state.lang]; }
  function pad(n){ return String(n).padStart(2,'0'); }

  function splitTime(total){
    total = Math.max(0, Math.floor(total));
    return {
      hour: Math.floor(total / 3600),
      minute: Math.floor((total % 3600) / 60),
      second: total % 60
    };
  }

  function formatReadableTime(total){
    const d = splitTime(total);
    if(state.lang === 'zh'){
      return `${d.hour}时${pad(d.minute)}分${pad(d.second)}秒`;
    }
    return `${d.hour}h ${pad(d.minute)}m ${pad(d.second)}s`;
  }

  function showToast(message){
    clearTimeout(toastTimer);
    el.toast.textContent = message;
    el.toast.classList.add('show');
    toastTimer = setTimeout(() => el.toast.classList.remove('show'), 1200);
  }

  function stopInterval(){
    if(state.intervalId !== null){
      clearInterval(state.intervalId);
      state.intervalId = null;
    }
  }

  function render(){
    const display = splitTime(state.remainingSeconds);

    el.title.textContent = t().title;
    el.hourLabel.textContent = t().hour;
    el.minuteLabel.textContent = t().minute;
    el.modeOnBtn.textContent = t().modeOn;
    el.modeOffBtn.textContent = t().modeOff;

    el.hourValue.textContent = pad(display.hour);
    el.minuteValue.textContent = pad(display.minute);

    el.statusText.textContent =
      state.finished ? (state.mode === 'on' ? t().doneOn : t().doneOff) :
      state.enabled ? t().counting :
      t().idle;

    el.modeOnBtn.classList.toggle('selected', state.mode === 'on');
    el.modeOffBtn.classList.toggle('selected', state.mode === 'off');

    const lockMode = state.enabled || state.finished;
    el.modeOnBtn.disabled = lockMode;
    el.modeOffBtn.disabled = lockMode;

    el.screen.classList.toggle('enabled', state.enabled);
    el.screen.classList.toggle('finished', state.finished);
    el.screen.classList.toggle('ringing', state.finished);
  }

  function updateCountdown(){
    if(!state.enabled) return;

    state.remainingSeconds = Math.max(
      0,
      Math.ceil((state.endAt - Date.now()) / 1000)
    );

    if(state.remainingSeconds <= 0){
      stopInterval();
      state.enabled = false;
      state.finished = true;
      render();
      showToast(state.mode === 'on' ? t().doneOn : t().doneOff);
      return;
    }

    render();
  }

  function startCountdown(){
    state.finished = false;
    state.remainingSeconds = state.configuredSeconds;
    state.enabled = true;
    state.endAt = Date.now() + state.configuredSeconds * 1000;

    stopInterval();
    state.intervalId = setInterval(updateCountdown, 250);

    render();
    showToast(state.mode === 'on' ? t().startedOn : t().startedOff);
  }

  function cancelCountdown(){
    stopInterval();
    state.enabled = false;
    state.finished = false;
    state.remainingSeconds = state.configuredSeconds;
    render();
    showToast(t().canceled);
  }

  el.modeOnBtn.addEventListener('click', () => {
    if(state.enabled || state.finished) return;
    state.mode = 'on';
    render();
  });

  el.modeOffBtn.addEventListener('click', () => {
    if(state.enabled || state.finished) return;
    state.mode = 'off';
    render();
  });

  document.addEventListener('visibilitychange', () => {
    if(!document.hidden && state.enabled) updateCountdown();
  });

  render();
})();
</script>
</body>
</html>
